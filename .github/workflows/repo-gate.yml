name: repo-gate-required

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repo_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SPARROW_ALLOW_NETWORK_FALLBACK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git

      - name: Install Python deps (pinned)
        run: |
          python3 -m pip install --break-system-packages -r requirements-dev.txt

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Sparrow source/build
        uses: actions/cache@v4
        with:
          path: .cache/sparrow
          key: sparrow-${{ hashFiles('poc/sparrow_io/sparrow_commit.txt') }}
          restore-keys: |
            sparrow-

      - name: Build nesting_engine (release)
        run: |
          cargo build --release --manifest-path rust/nesting_engine/Cargo.toml

      - name: Run repo gate
        run: |
          ./scripts/check.sh

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repo-gate-artifacts
          path: |
            runs/**
            .cache/sparrow/**
