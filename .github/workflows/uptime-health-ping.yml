name: uptime-health-ping

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  health-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run health ping
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: |
          if [ -z "${API_HEALTH_URL}" ]; then
            echo "API_HEALTH_URL secret is not configured; skipping uptime ping."
            exit 0
          fi
          python3 scripts/uptime_health_ping.py
