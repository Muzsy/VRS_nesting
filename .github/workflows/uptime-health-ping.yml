name: uptime-health-ping

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  health-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run health ping
        if: ${{ secrets.API_HEALTH_URL != '' }}
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: python3 scripts/uptime_health_ping.py

      - name: Skip notice
        if: ${{ secrets.API_HEALTH_URL == '' }}
        run: echo "API_HEALTH_URL secret is not configured; skipping uptime ping."
