name: sparrow-io-smoketest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  smoketest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SPARROW_ALLOW_NETWORK_FALLBACK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git

      - name: Install Python deps (pinned)
        run: |
          python3 -m pip install --break-system-packages -r requirements-dev.txt

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Sparrow source/build
        uses: actions/cache@v4
        with:
          path: .cache/sparrow
          key: sparrow-${{ hashFiles('poc/sparrow_io/sparrow_commit.txt') }}
          restore-keys: |
            sparrow-

      - name: Unit tests (pytest)
        run: |
          python3 -m pytest -q

      - name: Resolve Sparrow binary
        run: |
          chmod +x scripts/ensure_sparrow.sh
          echo "SPARROW_BIN=$(./scripts/ensure_sparrow.sh)" >> $GITHUB_ENV

      - name: Run smoketest
        run: |
          chmod +x scripts/run_sparrow_smoketest.sh scripts/validate_sparrow_io.py
          ./scripts/run_sparrow_smoketest.sh poc/sparrow_io/swim.json

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sparrow-smoketest-artifacts
          path: |
            runs/**
            poc/sparrow_io/*.json
            poc/sparrow_io/*.svg
