name: nesttool-smoketest

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  nesttool_smoketest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git

      - name: Install Python deps (pinned)
        run: |
          python3 -m pip install --break-system-packages -r requirements-dev.txt

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Unit tests (pytest)
        run: |
          python3 -m pytest -q

      - name: Build VRS solver (release)
        run: |
          cargo build --release --manifest-path rust/vrs_solver/Cargo.toml

      - name: Prepare smoke input
        run: |
          cat > /tmp/nesttool_smoke_input.json <<'JSON'
          {
            "contract_version": "v1",
            "project_name": "ci_smoke",
            "seed": 0,
            "time_limit_s": 60,
            "stocks": [
              {
                "id": "SHEET_A",
                "quantity": 2,
                "outer_points": [[0, 0], [100, 0], [100, 100], [0, 100]],
                "holes_points": [
                  [[70, 70], [80, 70], [80, 80], [70, 80]]
                ]
              }
            ],
            "parts": [
              {"id": "PART_1", "width": 70, "height": 60, "quantity": 2, "allowed_rotations_deg": [0]},
              {"id": "PART_2", "width": 120, "height": 20, "quantity": 1, "allowed_rotations_deg": [0]}
            ]
          }
          JSON

      - name: Run solver via runner
        run: |
          python3 -m vrs_nesting.runner.vrs_solver_runner \
            --input /tmp/nesttool_smoke_input.json \
            --solver-bin ./rust/vrs_solver/target/release/vrs_solver \
            --seed 0 \
            --time-limit 60 \
            --run-root runs

      - name: Validate latest run
        run: |
          RUN_DIR="$(ls -1dt runs/* | head -n1)"
          python3 scripts/validate_nesting_solution.py --run-dir "$RUN_DIR"

      - name: Determinism hash stability smoke
        run: |
          RUN_A="$(python3 -m vrs_nesting.runner.vrs_solver_runner \
            --input /tmp/nesttool_smoke_input.json \
            --solver-bin ./rust/vrs_solver/target/release/vrs_solver \
            --seed 0 \
            --time-limit 60 \
            --run-root runs)"
          RUN_B="$(python3 -m vrs_nesting.runner.vrs_solver_runner \
            --input /tmp/nesttool_smoke_input.json \
            --solver-bin ./rust/vrs_solver/target/release/vrs_solver \
            --seed 0 \
            --time-limit 60 \
            --run-root runs)"
          HASH_A="$(python3 - "$RUN_A/runner_meta.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          meta = json.loads(Path(sys.argv[1]).read_text(encoding='utf-8'))
          print(str(meta.get('output_sha256', '')).strip())
          PY
          )"
          HASH_B="$(python3 - "$RUN_B/runner_meta.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          meta = json.loads(Path(sys.argv[1]).read_text(encoding='utf-8'))
          print(str(meta.get('output_sha256', '')).strip())
          PY
          )"
          if [ -z "$HASH_A" ] || [ -z "$HASH_B" ]; then
            echo "Missing output_sha256 in runner_meta"
            exit 2
          fi
          if [ "$HASH_A" != "$HASH_B" ]; then
            echo "Determinism hash mismatch"
            echo "run_a=$RUN_A hash=$HASH_A"
            echo "run_b=$RUN_B hash=$HASH_B"
            exit 1
          fi
          echo "Determinism hash stable: $HASH_A"

      - name: Timeout/perf guard smoke
        run: |
          python3 scripts/smoke_time_budget_guard.py --require-real-solver

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nesttool-smoketest-artifacts
          path: |
            runs/**
            rust/vrs_solver/target/**
