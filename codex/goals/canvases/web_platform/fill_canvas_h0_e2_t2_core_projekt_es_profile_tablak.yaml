steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H0-E2-T2 core projekt- es profile tablak task teljes
      artefaktlancat: canvas, goal YAML, runner prompt, checklist es report.
    outputs:
      - "canvases/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h0_e2_t2_core_projekt_es_profile_tablak.yaml"
      - "codex/prompts/web_platform/h0_e2_t2_core_projekt_es_profile_tablak/run.md"
      - "codex/codex_checklist/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.md"
      - "codex/reports/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.md"

  - name: "Core projekt- es profile tablakat letrehozo migracio elkeszitese"
    description: >
      Hozd letre a kovetkezo H0-E2 migraciot a `profiles`, `projects`,
      `project_settings` tablakhoz.
      A migracio:
      1) az `app` schema-n belul dolgozzon,
      2) megfeleljen a H0-E1-T1/T2/T3 ownership es snapshot-first elveknek,
      3) hozza letre a 3 tablathoz szukseges PK/FK kapcsolatokat,
      4) tartalmazza a minimalisan szukseges indexeket,
      5) ne hozzon letre technology/file/revision/run domain tablakat,
      6) ne vezessen be meg RLS-t vagy auth auto-provisioning logikat.
      Ha `updated_at` helper function/trigger kell, az maradjon minimalis,
      es csak e task keretein belul hasznalt mintazat legyen.
    outputs:
      - "supabase/migrations/20260310223000_h0_e2_t2_profiles_projects_project_settings.sql"

  - name: "Minimal docs szinkron a core tabla-iranyhoz"
    description: >
      Minimalisan frissitsd a fo architecture es H0 roadmap dokumentumot, ha
      bennuk a konkret tablairany stale, leegyszerusitett, vagy `public.*`
      schema felol fogalmazott a mostani `app.*` migracios iranyhoz kepest.
      A cel nem a teljes doksi atszerkesztese, hanem a source-of-truth
      irany helyreallitasa.
    outputs:
      - "docs/web_platform/architecture/dxf_nesting_platform_architektura_es_supabase_schema.md"
      - "docs/web_platform/roadmap/dxf_nesting_platform_h0_reszletes.md"

  - name: "Checklist es report frissitese"
    description: >
      Frissitsd a checklistet es a reportot.
      A report a report_standard szerkezetet kovesse, kulon DoD -> Evidence Matrix
      resszel.
      Kulon sorold fel:
      - a 3 tabla vegleges oszlopkeszletet;
      - a PK/FK kapcsolatokat;
      - az indexeket;
      - hogy a task szandekosan NEM hozott letre technology/file/revision/run
        domain tablakat;
      - hogy nem kerult bele RLS vagy auth auto-provisioning logika.
    outputs:
      - "codex/codex_checklist/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.md"
      - "codex/reports/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.md
    outputs:
      - "codex/reports/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.md"
      - "codex/reports/web_platform/h0_e2_t2_core_projekt_es_profile_tablak.verify.log"