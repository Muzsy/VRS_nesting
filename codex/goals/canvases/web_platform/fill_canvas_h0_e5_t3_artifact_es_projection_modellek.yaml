steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H0-E5-T3 artifact es projection modellek task teljes
      artefaktlancat: canvas, goal YAML, runner prompt, checklist es report.
    outputs:
      - "canvases/web_platform/h0_e5_t3_artifact_es_projection_modellek.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h0_e5_t3_artifact_es_projection_modellek.yaml"
      - "codex/prompts/web_platform/h0_e5_t3_artifact_es_projection_modellek/run.md"
      - "codex/codex_checklist/web_platform/h0_e5_t3_artifact_es_projection_modellek.md"
      - "codex/reports/web_platform/h0_e5_t3_artifact_es_projection_modellek.md"

  - name: "Artifact es projection bazis migracio elkeszitese"
    description: >
      Hozd letre a kovetkezo H0 migraciot az `app.run_artifacts`,
      `app.run_layout_sheets`, `app.run_layout_placements`,
      `app.run_layout_unplaced`, `app.run_metrics` tablakkal.
      A migracio:
      1) az `app` schema-n belul dolgozzon,
      2) az artifact tabla az `app.artifact_kind` enumot hasznalja,
      3) fizikailag kulon kezelje az artifact es projection reteget,
      4) a projection tablavilag a run-hoz legyen kotve,
      5) a `run_metrics` legyen a run-level osszegzett eredmeny taroloja,
      6) szandekosan ne hozzon letre kulon `app.run_results` tablat,
      7) ne vezessen be meg storage bucket policyt,
      8) ne vezessen be meg RLS-t.
      A vegleges oszlopkeszletet a H0 reszletes docs es a task tree outputjai
      alapjan vezesd le, de maradj minimalis es stabil H0 scope-ban.
    outputs:
      - "supabase/migrations/20260314110000_h0_e5_t3_artifact_es_projection_modellek.sql"

  - name: "Minimal docs szinkron a T3 source-of-truth iranyhoz"
    description: >
      Minimalisan frissitsd a snapshot-first source-of-truth, a fo architecture
      es a H0 roadmap dokumentumot, hogy egyertelmu legyen:
      1) a T3 fizikai outputja `app.run_artifacts` + `app.run_layout_*` + `app.run_metrics`,
      2) kulon `app.run_results` tabla most nem jon letre,
      3) a fogalmi result reteg H0-ban a metrics + projection + artifact
         egyuttesben jelenik meg,
      4) ahol a T3-kozelben meg stale `public.run_layout_*` vagy `public.run_metrics`
         schema-prefix maradt, azt minimalisan igazitsd az `app.*` iranyhoz,
      5) a stale `run_results` emlitest a T3 source-of-truth iranyhoz igazitsd.
      A cel nem a teljes web_platform dokumentaciocsomag ujraszerkesztese,
      hanem a H0-E5-T3 koruli modellezesi tisztasag helyreallitasa.
    outputs:
      - "docs/web_platform/architecture/h0_snapshot_first_futasi_es_adatkontraktus.md"
      - "docs/web_platform/architecture/dxf_nesting_platform_architektura_es_supabase_schema.md"
      - "docs/web_platform/roadmap/dxf_nesting_platform_h0_reszletes.md"

  - name: "Checklist es report frissitese"
    description: >
      Frissitsd a checklistet es a reportot.
      A report a report_standard szerkezetet kovesse, kulon DoD -> Evidence Matrix resszel.
      Kulon sorold fel:
      - az `app.run_artifacts` vegleges oszlopkeszletet;
      - az `app.run_layout_sheets` vegleges oszlopkeszletet;
      - az `app.run_layout_placements` vegleges oszlopkeszletet;
      - az `app.run_layout_unplaced` vegleges oszlopkeszletet;
      - az `app.run_metrics` vegleges oszlopkeszletet;
      - az `app.artifact_kind` enum hasznalatot;
      - hogy az artifact es projection reteg fizikailag kulon marad;
      - hogy a task szandekosan NEM hozott letre kulon `app.run_results` tablat;
      - hogy a task NEM vezetett be storage policyt vagy RLS policyt.
    outputs:
      - "codex/codex_checklist/web_platform/h0_e5_t3_artifact_es_projection_modellek.md"
      - "codex/reports/web_platform/h0_e5_t3_artifact_es_projection_modellek.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h0_e5_t3_artifact_es_projection_modellek.md
    outputs:
      - "codex/reports/web_platform/h0_e5_t3_artifact_es_projection_modellek.md"
      - "codex/reports/web_platform/h0_e5_t3_artifact_es_projection_modellek.verify.log"
