steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H2-E5-T4 task dokumentacios alapjat: canvas, goal YAML,
      runner prompt, checklist es report. A tartalom igazodjon a meglevo
      web_platform H2 mintakhoz, de pontositsa a jelenlegi placeholder taskot:
      legyen explicit target fagyasztas (`hypertherm_edge_connect`,
      `hypertherm_edge_connect`, `basic_plasma_eia_rs274d`), legyen kimondva,
      hogy a task optionalis H2 ag, es legyen rogzitve, hogy a meglevo
      `machine_program` artifact kindot hasznaljuk, nem uj enum/migration
      bevezetese a cel. A canvas kulon mondja ki azt is, hogy owner-scoped
      postprocessor profile domain miatt nincs globalis SQL seed migration.
    outputs:
      - "canvases/web_platform/h2_e5_t4_elso_machine_specific_adapter.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h2_e5_t4_elso_machine_specific_adapter.yaml"
      - "codex/prompts/web_platform/h2_e5_t4_elso_machine_specific_adapter/run.md"
      - "codex/codex_checklist/web_platform/h2_e5_t4_elso_machine_specific_adapter.md"
      - "codex/reports/web_platform/h2_e5_t4_elso_machine_specific_adapter.md"

  - name: "Machine-specific adapter service implementalasa"
    description: >
      Keszits dedikalt `api/services/machine_specific_adapter.py` service-t.
      A service primer bemenete a runhoz tartozo persisted
      `manufacturing_plan_json` artifact legyen, amelyet a `run_artifacts`
      retegbol owner-scoped modon kell betolteni. Innen indulva ellenorizd a
      snapshotolt postprocessor selectiont es a kapcsolt
      `postprocessor_profile_versions.config_jsonb`-t. A service csak a
      befagyasztott targetet tamogassa:
      - adapter_key = `hypertherm_edge_connect`
      - output_format = `basic_plasma_eia_rs274d`
      A geometriai pontok feloldasa kizárólag a `manufacturing_plan_json`
      payloadban szereplo `plan_id` + `contour_index` alapjan tortenhet
      `run_manufacturing_contours.geometry_derivative_id` es
      `geometry_derivatives.derivative_jsonb` (`manufacturing_canonical`)
      vilagbol. A service per-sheet `machine_program` artifactokat generaljon,
      deterministic filename/content/storage policy-val, es idempotensen cserelje
      ugyanennek a target legacy type-nak a korabbi artifactjait.
      Ne irjon vissza manufacturing truth tablaba, ne vezessen be uj artifact
      kindot, ne hozzon letre `machine_ready_bundle`-t, es ne tervezzen uj
      lead-in/out geometriat.
    outputs:
      - "api/services/machine_specific_adapter.py"

  - name: "Task-specifikus smoke es dokumentacios artefaktok frissitese"
    description: >
      Keszits `scripts/smoke_h2_e5_t4_elso_machine_specific_adapter.py`
      smoke scriptet. A smoke bizonyitsa legalabb:
      1) valid `manufacturing_plan_json` + valid target config -> per-sheet
         `machine_program` artifactok letrejonnek;
      2) `artifact_kind='machine_program'` es
         `legacy_artifact_type='hypertherm_edge_connect_basic_plasma_eia'`;
      3) ugyanarra a truthra a content hash, filename es storage path deterministic;
      4) unsupported lead / arc eseten csak config szerinti fallback vagy
         determinisztikus hiba lep eletbe;
      5) ownership boundary ervenyesul;
      6) hiba jon, ha a `manufacturing_plan_json` artifact, a target adapter
         metadata vagy a kotelezo `config_jsonb` blokkok hianyoznak;
      7) nincs write manufacturing truth vagy postprocessor truth tablaba;
      8) nincs masodik implicit generic adapter, bundle zip vagy egyeb
         machine-specific mellekhatas.
      Frissitsd a checklistet es reportot evidence-alapon. A report kulon mondja
      ki, hogy ez a task nem vezet be globalis SQL seedet, nem ad uj artifact
      kindot, es a lead-in/out csak mapping/fallback scope-ban marad.
    outputs:
      - "scripts/smoke_h2_e5_t4_elso_machine_specific_adapter.py"
      - "codex/codex_checklist/web_platform/h2_e5_t4_elso_machine_specific_adapter.md"
      - "codex/reports/web_platform/h2_e5_t4_elso_machine_specific_adapter.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel. Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h2_e5_t4_elso_machine_specific_adapter.md
    outputs:
      - "codex/reports/web_platform/h2_e5_t4_elso_machine_specific_adapter.md"
      - "codex/reports/web_platform/h2_e5_t4_elso_machine_specific_adapter.verify.log"
