steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a phase2_p5_run_log_streaming_api task
      canvas/yaml/checklist/report alapokat.
    outputs:
      - "canvases/web_platform/phase2_p5_run_log_streaming_api.md"
      - "codex/goals/canvases/web_platform/fill_canvas_phase2_p5_run_log_streaming_api.yaml"
      - "codex/codex_checklist/web_platform/phase2_p5_run_log_streaming_api.md"
      - "codex/reports/web_platform/phase2_p5_run_log_streaming_api.md"

  - name: "Run log endpoint + worker sync"
    description: >
      Implementald az offset alapu run log endpointot es a worker periodikus
      run.log szinkront futas kozben.
    outputs:
      - "api/routes/runs.py"
      - "worker/main.py"

  - name: "Checklist es report frissites"
    description: >
      Frissitsd a task checklistet/reportot es a master checklist P2.5 pontjait.
    outputs:
      - "codex/codex_checklist/web_platform/phase2_p5_run_log_streaming_api.md"
      - "codex/reports/web_platform/phase2_p5_run_log_streaming_api.md"
      - "codex/codex_checklist/web_platform/implementacios_terv_master_checklist.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs: ./scripts/verify.sh --report codex/reports/web_platform/phase2_p5_run_log_streaming_api.md
    outputs:
      - "codex/reports/web_platform/phase2_p5_run_log_streaming_api.md"
      - "codex/reports/web_platform/phase2_p5_run_log_streaming_api.verify.log"
