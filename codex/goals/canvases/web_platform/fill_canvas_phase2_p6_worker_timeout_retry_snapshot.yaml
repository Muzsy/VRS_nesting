steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a phase2_p6_worker_timeout_retry_snapshot task
      canvas/yaml/checklist/report alapokat.
    outputs:
      - "canvases/web_platform/phase2_p6_worker_timeout_retry_snapshot.md"
      - "codex/goals/canvases/web_platform/fill_canvas_phase2_p6_worker_timeout_retry_snapshot.yaml"
      - "codex/codex_checklist/web_platform/phase2_p6_worker_timeout_retry_snapshot.md"
      - "codex/reports/web_platform/phase2_p6_worker_timeout_retry_snapshot.md"

  - name: "Worker hardening implementacio"
    description: >
      Implementald a timeout + retry + input snapshot hash + ertelmezheto hiba
      worker oldali logikat.
    outputs:
      - "worker/main.py"
      - "worker/README.md"

  - name: "Checklist es report frissites"
    description: >
      Frissitsd a task checklistet/reportot es a master checklist P2.6 pontjait.
    outputs:
      - "codex/codex_checklist/web_platform/phase2_p6_worker_timeout_retry_snapshot.md"
      - "codex/reports/web_platform/phase2_p6_worker_timeout_retry_snapshot.md"
      - "codex/codex_checklist/web_platform/implementacios_terv_master_checklist.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs: ./scripts/verify.sh --report codex/reports/web_platform/phase2_p6_worker_timeout_retry_snapshot.md
    outputs:
      - "codex/reports/web_platform/phase2_p6_worker_timeout_retry_snapshot.md"
      - "codex/reports/web_platform/phase2_p6_worker_timeout_retry_snapshot.verify.log"
