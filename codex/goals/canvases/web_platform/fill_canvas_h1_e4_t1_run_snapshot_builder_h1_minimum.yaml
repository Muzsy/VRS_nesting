steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H1-E4-T1 task canvas/YAML/checklist/report alapjait,
      a web_platform H0/H1 source-of-truth doksikhoz es a meglevo H1 taskmintakhoz
      igazitva.
    outputs:
      - "canvases/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h1_e4_t1_run_snapshot_builder_h1_minimum.yaml"
      - "codex/codex_checklist/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md"
      - "codex/reports/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md"

  - name: "Run snapshot builder service kialakitasa"
    description: >
      Vezess be explicit snapshot builder service-t, amely a projekt aktualis,
      solver-input relevans truthjat determinisztikusan osszeolvassa a H0/H1
      canonical tablavilagbol. A service valassza ki a project-level technology
      setupot, gyujtse az aktiv project part requirementeket es aktiv project
      sheet inputokat, ellenorizze a solverre alkalmas part revision +
      derivative bindinget, majd allitson elo H0 snapshot-structure kompatibilis
      manifest payloadot es stabil snapshot hash-t. A task maradjon route/queue
      nelkuli builder scope-ban.
    outputs:
      - "api/services/run_snapshot_builder.py"
      - "codex/reports/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md"

  - name: "Task-specifikus smoke es dokumentacios artefaktok frissitese"
    description: >
      Keszits task-specifikus smoke scriptet a sikeres snapshot build,
      determinisztikus hash, hianyzo technology setup, hianyzo aktiv requirement,
      hianyzo aktiv sheet input es nem approved / derivative nelkuli part
      revision agakra. Frissitsd a checklistet es a reportot evidence-alapon,
      DoD -> Evidence matrixszal, es dokumentald kulon, hogy a task mit szallit
      le H1 minimum builder scope-ban, illetve mi marad a H1-E4-T2/T3 es H1-E5
      taskokba.
    outputs:
      - "scripts/smoke_h1_e4_t1_run_snapshot_builder_h1_minimum.py"
      - "codex/codex_checklist/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md"
      - "codex/reports/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a standard ellenorzest wrapperrel, es frissitsd automatikusan a
      reportot valamint a verify logot. Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md
    outputs:
      - "codex/reports/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.md"
      - "codex/reports/web_platform/h1_e4_t1_run_snapshot_builder_h1_minimum.verify.log"
