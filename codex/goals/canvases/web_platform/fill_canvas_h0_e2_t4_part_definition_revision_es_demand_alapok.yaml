
steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H0-E2-T4 part definition, revision es demand alapok task teljes
      artefaktlancat: canvas, goal YAML, runner prompt, checklist es report.
    outputs:
      - "canvases/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h0_e2_t4_part_definition_revision_es_demand_alapok.yaml"
      - "codex/prompts/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok/run.md"
      - "codex/codex_checklist/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.md"
      - "codex/reports/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.md"

  - name: "Part-domain bazis migracio elkeszitese"
    description: >
      Hozd letre a kovetkezo H0-E2 migraciot a `part_definitions`,
      `part_revisions` es `project_part_requirements` tablavilaghoz.
      A migracio:
      1) az `app` schema-n belul dolgozzon,
      2) kulonitse el a definition / revision / demand vilagot,
      3) a demandot a veglegesitett domain modellnek megfeleloen a
         `part_revisions` vilagra kösse,
      4) tartalmazza a szukseges PK/FK kapcsolatokat es minimalis indexeket,
      5) ne hozzon letre geometry/file/sheet/run/remnant/export tablakat,
      6) ne vezessen be meg RLS-t.
      Ha a geometry pipeline tablák meg nincsenek letéve, ne eroszakolj be
      hianyzo FK-ket; a revision tabla most minimalis, de stabil domain bazis legyen.
    outputs:
      - "supabase/migrations/20260310233000_h0_e2_t4_part_definition_revision_es_demand_alapok.sql"

  - name: "Minimal docs szinkron a part-domain iranyhoz"
    description: >
      Minimalisan frissitsd a fo architecture es H0 roadmap dokumentumot, ha a
      part-domain tablairany ott meg stale, `public.*` schemaju, vagy a demand
      vilagot hibasan a definitionhoz koti a veglegesitett domain ownershiphoz kepest.
      A cel nem a teljes doksi atszerkesztese, hanem a source-of-truth irany
      helyreallitasa.
    outputs:
      - "docs/web_platform/architecture/dxf_nesting_platform_architektura_es_supabase_schema.md"
      - "docs/web_platform/roadmap/dxf_nesting_platform_h0_reszletes.md"

  - name: "Checklist es report frissitese"
    description: >
      Frissitsd a checklistet es a reportot.
      A report a report_standard szerkezetet kovesse, kulon DoD -> Evidence Matrix
      resszel.
      Kulon sorold fel:
      - a `part_definitions` vegleges oszlopkeszletet;
      - a `part_revisions` vegleges oszlopkeszletet;
      - a `project_part_requirements` vegleges oszlopkeszletet;
      - a PK/FK kapcsolatokat es indexeket;
      - hogy a demand a revisionhoz kotott;
      - hogy a task szandekosan NEM hozott letre geometry/file/sheet/run/remnant/export
        domain tablakat;
      - hogy nem kerult bele RLS policy.
    outputs:
      - "codex/codex_checklist/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.md"
      - "codex/reports/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.md
    outputs:
      - "codex/reports/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.md"
      - "codex/reports/web_platform/h0_e2_t4_part_definition_revision_es_demand_alapok.verify.log"
