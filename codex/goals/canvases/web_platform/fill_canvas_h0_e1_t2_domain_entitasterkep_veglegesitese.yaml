steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H0-E1-T2 domain entitasterkep veglegesitese task alap artefaktjait:
      canvas, goal YAML, runner prompt, checklist es report.
      A fajlnevek es eleresi utak pontosan a web_platform area konvenciot kovessek.
    outputs:
      - "canvases/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h0_e1_t2_domain_entitasterkep_veglegesitese.yaml"
      - "codex/prompts/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese/run.md"
      - "codex/codex_checklist/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.md"
      - "codex/reports/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.md"

  - name: "H0 domain entitasterkep source-of-truth dokumentum letrehozasa"
    description: >
      Hozd letre a dedikalt H0 domain entitasterkep dokumentumot.
      A dokumentum rogzitese:
      1) a fo domain entitasokat,
      2) ezek tipusait (entity / value object / snapshot / projection / artifact),
      3) az aggregate root kapcsolatokat,
      4) a fo ownership es source-of-truth szabalyokat,
      5) az immutable vs mutable szeparaciot,
      6) a definition / usage / snapshot / result / artifact kulonvalasztast,
      7) a H0-E2 schema feladat szempontjabol relevans domain kovetkezmenyeket.
      A dokumentum mar ne csak architekturailag legyen korrekt, hanem schema-tervezesi
      inputkent is hasznalhato legyen.
    outputs:
      - "docs/web_platform/architecture/h0_domain_entitasterkep_es_ownership_matrix.md"

  - name: "Web platform dokumentacio szinkron frissitese"
    description: >
      Frissitsd a fo web_platform dokumentumokat ugy, hogy az uj H0 domain
      entitasterkep dokumentum legyen az entitas- es ownership-szintu source of truth.
      A README-ben, a fo architektura dokumentumban, a H0 modulhatar dokumentumban
      es a H0 reszletes roadmapban jelenjen meg egyertelmu hivatkozas az uj doksira.
      Minimal-invaziv modon dolgozz: ne irj at feleslegesen meglevo blokkot, csak
      a szukseges hivatkozasokat es rovid pontositasokat vezesd be.
    outputs:
      - "docs/web_platform/README.md"
      - "docs/web_platform/architecture/dxf_nesting_platform_architektura_es_supabase_schema.md"
      - "docs/web_platform/architecture/h0_modulhatarok_es_boundary_szerzodes.md"
      - "docs/web_platform/roadmap/dxf_nesting_platform_h0_reszletes.md"

  - name: "Checklist es report frissitese"
    description: >
      Hozd letre vagy frissitsd a task checklistet es reportot.
      A checklist rovid, pipalhato statuszlista legyen.
      A report a report_standard szerkezetet kovesse, kulon DoD -> Evidence Matrix
      resszel. Evidence nelkul nincs PASS.
      Mivel ez docs-only task, a bizonyitekok elsosorban dokumentum path + line
      hivatkozasok legyenek.
    outputs:
      - "codex/codex_checklist/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.md"
      - "codex/reports/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.md
    outputs:
      - "codex/reports/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.md"
      - "codex/reports/web_platform/h0_e1_t2_domain_entitasterkep_veglegesitese.verify.log"