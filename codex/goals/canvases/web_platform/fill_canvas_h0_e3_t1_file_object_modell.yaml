steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H0-E3-T1 file object modell task teljes artefaktlancat:
      canvas, goal YAML, runner prompt, checklist es report.
    outputs:
      - "canvases/web_platform/h0_e3_t1_file_object_modell.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h0_e3_t1_file_object_modell.yaml"
      - "codex/prompts/web_platform/h0_e3_t1_file_object_modell/run.md"
      - "codex/codex_checklist/web_platform/h0_e3_t1_file_object_modell.md"
      - "codex/reports/web_platform/h0_e3_t1_file_object_modell.md"

  - name: "File object bazis migracio elkeszitese"
    description: >
      Hozd letre a kovetkezo H0 migraciot az `app.file_objects` tablaval.
      A migracio:
      1) az `app` schema-n belul dolgozzon,
      2) metadata + storage-reference truth-ot modellezzen,
      3) kapcsolodjon az `app.projects` es `app.profiles` tablakhhoz,
      4) vedje a storage hivatkozas egyediseget,
      5) ne hozzon letre geometry_revisions, geometry_validation_reports,
         geometry_review_actions, geometry_derivatives, run vagy export tablakat,
      6) ne vezessen be meg RLS-t.
      A vegleges oszlopkeszletet a web_platform architecture/H0 roadmap file-domain
      iranyabol vezesd le, de maradj minimalis es stabil scope-ban.
    outputs:
      - "supabase/migrations/20260312001000_h0_e3_t1_file_object_modell.sql"

  - name: "Minimal docs szinkron a file-domain iranyhoz"
    description: >
      Minimalisan frissitsd a fo architecture es H0 roadmap dokumentumot, ha a
      file-domain blokk ott meg stale, `public.*` schemaju vagy ownership szempontbol
      pontatlan a mostani konkret migraciohoz kepest.
      A cel nem a teljes doksi atszerkesztese, hanem a source-of-truth irany helyreallitasa.
    outputs:
      - "docs/web_platform/architecture/dxf_nesting_platform_architektura_es_supabase_schema.md"
      - "docs/web_platform/roadmap/dxf_nesting_platform_h0_reszletes.md"

  - name: "Checklist es report frissitese"
    description: >
      Frissitsd a checklistet es a reportot.
      A report a report_standard szerkezetet kovesse, kulon DoD -> Evidence Matrix resszel.
      Kulon sorold fel:
      - a `file_objects` vegleges oszlopkeszletet;
      - a PK/FK kapcsolatokat;
      - az indexeket es uniqueness vedelmet;
      - hogy a task szandekosan NEM hozott letre geometry/review/derivative/run/export tablakat;
      - hogy nem kerult bele RLS policy.
    outputs:
      - "codex/codex_checklist/web_platform/h0_e3_t1_file_object_modell.md"
      - "codex/reports/web_platform/h0_e3_t1_file_object_modell.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h0_e3_t1_file_object_modell.md
    outputs:
      - "codex/reports/web_platform/h0_e3_t1_file_object_modell.md"
      - "codex/reports/web_platform/h0_e3_t1_file_object_modell.verify.log"
