schema_version: "1.0"
task_slug: "dxf_prefilter_e5_t4_rollout_and_compatibility_plan"
title: "DXF Prefilter E5-T4 — Rollout es kompatibilitasi terv"
objective: >
  Keszits repo-grounded rollout es compatibility runbookot a DXF prefilter lane-hez
  a mar implementalt E3-T5 gate, legacy fallback es frontend visibility truth alapjan.
  A task docs/ops jellegu: ne hozz letre uj feature-t, endpointot, migrationt vagy persisted domaint.

context_files:
  - "AGENTS.md"
  - "docs/codex/overview.md"
  - "docs/codex/yaml_schema.md"
  - "docs/codex/report_standard.md"
  - "docs/qa/testing_guidelines.md"
  - "api/config.py"
  - "api/routes/files.py"
  - "api/services/dxf_geometry_import.py"
  - "frontend/src/lib/featureFlags.ts"
  - "frontend/src/App.tsx"
  - "frontend/src/pages/ProjectDetailPage.tsx"
  - "canvases/web_platform/dxf_prefilter_e3_t5_feature_flag_and_rollout_gate.md"
  - "codex/reports/web_platform/dxf_prefilter_e3_t5_feature_flag_and_rollout_gate.md"
  - "canvases/web_platform/dxf_prefilter_e5_t2_end_to_end_api_tests.md"
  - "canvases/web_platform/dxf_prefilter_e5_t3_ui_smoke_and_integration_tests.md"
  - "canvases/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md"

constraints:
  - "Csak olyan fajlt hozz letre vagy modosits, ami szerepel valamelyik step outputs listajaban."
  - "Ne hozz letre uj backend/front-end feature-t, endpointot, migrationt, persistence-t vagy analytics pipeline-t."
  - "A task docs/ops jellegu: a mar implementalt current-code truthot kell dokumentalni es operationalizalni."
  - "Ne talalj ki project-level rollout flaget vagy runtime frontend config endpointot."
  - "Ne tavolitsd el a legacy fallbackot, csak dokumentald a jelenlegi szerepet es a sunset criteria-t."
  - "A structural smoke csak a dokumentum current-code grounded allitasait ellenorizze."

steps:
  - name: "Felderites es task-artefaktok letrehozasa"
    description: >
      Olvasd el az AGENTS/doc szabalyokat, valamint a current-code rollout gate/fallback fajlokat.
      Hozd letre a task canvas/YAML/runner/checklist/report alapfajljait.
    outputs:
      - "canvases/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md"
      - "codex/goals/canvases/web_platform/fill_canvas_dxf_prefilter_e5_t4_rollout_and_compatibility_plan.yaml"
      - "codex/prompts/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan/run.md"
      - "codex/codex_checklist/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md"
      - "codex/reports/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md"

  - name: "Rollout es compatibility dokumentum megirasa"
    description: >
      Keszits kulon docs fajlt a DXF prefilter rollout truthhoz. A dokumentum explicit current-code
      truthra epuljon: backend canonical flag, frontend build-time mirror, ON/OFF behavior matrix,
      legacy fallback, replacement gate, rollout stage-ek, rollback eljaras, support/debug checklist,
      rollout metrics terv es legacy sunset criteria.
    outputs:
      - "docs/web_platform/architecture/dxf_prefilter_rollout_and_compatibility_plan.md"

  - name: "Task-specifikus structural smoke"
    description: >
      Keszits deterministic smoke scriptet, amely bizonyitja, hogy a rollout/compatibility dokumentum
      letezik, explicit nevezi a canonical flag-eket, kimondja a legacy fallback truthot, tartalmazza
      az ON/OFF matrixot, a support/debug checklistet es a metrics tervet, es nem allit project-level
      rollout flaget vagy runtime frontend config endpointot.
    outputs:
      - "scripts/smoke_dxf_prefilter_e5_t4_rollout_and_compatibility_plan.py"

  - name: "Checklist es report evidence frissitese"
    description: >
      Frissitsd a checklistet es a reportot evidence alapon. A report kulon rogzitese,
      hogy miert docs/ops task a helyes E5-T4, hogyan epit a mar implementalt E3-T5 gate-re,
      mi a current compatibility guarantee, es miert csak sunset criteria a helper removal helyett.
    outputs:
      - "codex/codex_checklist/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md"
      - "codex/reports/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel.
      Parancs: ./scripts/verify.sh --report codex/reports/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md
    outputs:
      - "codex/reports/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.md"
      - "codex/reports/web_platform/dxf_prefilter_e5_t4_rollout_and_compatibility_plan.verify.log"
