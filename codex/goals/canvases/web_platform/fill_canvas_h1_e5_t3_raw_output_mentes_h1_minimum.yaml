steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H1-E5-T3 task canvas/YAML/checklist/report alapjait,
      a web_platform H1 source-of-truth doksikhoz, a H0 storage path policyhoz,
      a run_artifacts schemahoz es a meglevo H1 worker-task mintakhoz igazitva.
    outputs:
      - "canvases/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h1_e5_t3_raw_output_mentes_h1_minimum.yaml"
      - "codex/codex_checklist/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md"
      - "codex/reports/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md"

  - name: "Canonical raw output artifact persistence boundary kialakitasa"
    description: >
      Vezess be explicit worker-oldali helper/service boundaryt a raw output
      mentesehez. A helper a solver stdout/stderr/raw result/run-log/runner-meta
      fajlok tarolasat a H0 canonical `run-artifacts` bucket +
      `projects/{project_id}/runs/{run_id}/{artifact_kind}/{content_hash}.{ext}`
      path policy szerint vegezze, es idempotensen regisztralja azokat az
      `app.run_artifacts` tablaba. A scope maradjon nyers artifact reteg:
      ne nyisson result normalizer, projection vagy viewer/export pipeline
      munkat.
    outputs:
      - "worker/main.py"
      - "worker/raw_output_artifacts.py"
      - "vrs_nesting/runner/vrs_solver_runner.py"
      - "codex/reports/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md"

  - name: "Task-specifikus smoke es dokumentacios artefaktok frissitese"
    description: >
      Keszits task-specifikus smoke scriptet fake upload/client boundaryval,
      amely bizonyitja a canonical project-prefixes storage pathot,
      a raw artifact kind/metadata mappinget, az idempotens hash/path kepzest,
      valamint azt, hogy success/failure/timeout jellegu agban a lenyegi raw
      evidence visszakeresheto marad. Frissitsd a checklistet es a reportot
      evidence-alapon, DoD -> Evidence matrixszal, es nevezd meg kulon, hogy a
      task pontosan mely raw artifactokat garantalja es mit hagy szandekosan a
      H1-E6 normalizer/viewer blokknak.
    outputs:
      - "scripts/smoke_h1_e5_t3_raw_output_mentes_h1_minimum.py"
      - "codex/codex_checklist/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md"
      - "codex/reports/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a standard ellenorzest wrapperrel, es frissitsd automatikusan a
      reportot valamint a verify logot. Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md
    outputs:
      - "codex/reports/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.md"
      - "codex/reports/web_platform/h1_e5_t3_raw_output_mentes_h1_minimum.verify.log"
