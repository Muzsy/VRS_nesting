steps:
  - name: "Task artefaktok letrehozasa"
    description: >
      Hozd letre a H2-E5-T2 task teljes artefaktlancanak alapjat: canvas,
      goal YAML, runner prompt, checklist es report. A tartalom igazodjon a
      meglevo web_platform H2 mintakhoz, de a scope maradjon szuk,
      kizarolag a postprocessor profile/version domain aktiválására és a
      snapshotolható active postprocess selectionre.
    outputs:
      - "canvases/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.md"
      - "codex/goals/canvases/web_platform/fill_canvas_h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.yaml"
      - "codex/prompts/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa/run.md"
      - "codex/codex_checklist/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.md"
      - "codex/reports/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.md"

  - name: "Postprocessor domain schema + CRUD route/service + manufacturing ref"
    description: >
      Keszits uj migraciot, amely bevezeti az owner-scoped
      `app.postprocessor_profiles` es `app.postprocessor_profile_versions`
      truth reteget, valamint a `app.manufacturing_profile_versions`
      `active_postprocessor_profile_version_id` mezojet. A megoldas ne
      talaljon ki nem letezo `machine_catalog` vagy `material_catalog` FK
      vilagot; a schema maradjon repo-hu es minimalis. Keszits dedikalt
      `api/services/postprocessor_profiles.py` service-t es
      `api/routes/postprocessor_profiles.py` route-ot owner-scoped CRUD-dal
      profile es nested version szinten. Regisztrald az uj route-ot az
      `api/main.py`-ban.
    outputs:
      - "supabase/migrations/20260322040000_h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.sql"
      - "api/services/postprocessor_profiles.py"
      - "api/routes/postprocessor_profiles.py"
      - "api/main.py"

  - name: "Selection read-path + snapshot integration + smoke + dokumentacio"
    description: >
      Frissitsd a `project_manufacturing_selection` read-pathot es a
      `run_snapshot_builder`-t, hogy az aktiv manufacturing profile versionhoz
      kapcsolt postprocessor profile version referencia visszaadhato es
      snapshotolhato legyen. Aktiv, owner-valid postprocessor ref eseten a
      snapshotban `postprocess_selection_present=true` es
      `includes_postprocess=true` legyen; referencia nelkul maradjon false.
      Keszits task-specifikus smoke scriptet, amely bizonyitja: 1) owner-scoped
      CRUD mukodik; 2) idegen owner ref elutasitodik; 3) a selection read-path
      visszaadja a postprocessor refet; 4) a snapshot builder helyesen allitja
      a postprocess flag-eket; 5) nincs export/adaptor scope es nincs nem
      letezo catalog-FK vilag. Frissitsd a checklistet es reportot
      evidence-alapon.
    outputs:
      - "api/services/project_manufacturing_selection.py"
      - "api/routes/project_manufacturing_selection.py"
      - "api/services/run_snapshot_builder.py"
      - "scripts/smoke_h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.py"
      - "codex/codex_checklist/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.md"
      - "codex/reports/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a kotelezo minosegkaput wrapperrel. Parancs:
      ./scripts/verify.sh --report codex/reports/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.md
    outputs:
      - "codex/reports/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.md"
      - "codex/reports/web_platform/h2_e5_t2_postprocessor_profile_version_domain_aktivalasa.verify.log"
