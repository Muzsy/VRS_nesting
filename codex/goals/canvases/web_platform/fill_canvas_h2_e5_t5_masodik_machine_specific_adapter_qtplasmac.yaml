task_slug: "web_platform/h2_e5_t5_masodik_machine_specific_adapter_qtplasmac"
title: "H2-E5-T5 masodik machine-specific adapter (QtPlasmaC, optionalis)"
objective: >
  A mar meglevo Hypertherm-only machine-specific adaptert minimalisan,
  regresszio nelkul bovitsd ki ugy, hogy a `linuxcnc_qtplasmac` /
  `basic_manual_material_rs274ngc` target is tamogatott legyen a persisted
  `manufacturing_plan_json` artifactrol indulva, a szukitett `config_jsonb`
  boundary megtartasa mellett.

