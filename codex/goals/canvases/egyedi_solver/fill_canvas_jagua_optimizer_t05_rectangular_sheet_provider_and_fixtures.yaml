steps:
- name: Repo szabályok, JG tervdokumentáció és dependency preflight olvasása
  description: Olvasd el és tartsd be az AGENTS.md, docs/codex/overview.md, docs/codex/yaml_schema.md, docs/codex/report_standard.md
    és docs/qa/testing_guidelines.md fájlokat. Olvasd el a jagua-rs saját optimizer tervdokumentációit, a JG task
    indexet, a JG-03 és JG-04 reportokat, valamint ezt a JG-05 canvast. Nyerd ki a JG-05 pontos taskdefinícióját
    a task bontásból és progress checklistből. Ha JG-03 vagy JG-04 nem PASS, vagy a JG-04 report hiányzik, állj
    meg BLOCKED státusszal, és ne módosíts production kódot.
  inputs:
  - AGENTS.md
  - docs/codex/overview.md
  - docs/codex/yaml_schema.md
  - docs/codex/report_standard.md
  - docs/qa/testing_guidelines.md
  - canvases/jagua_rs_sajat_optimizer/plan/deep-research-report.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_rs_sajat_optimizer_fejlesztesi_terv.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_canvas_yaml_runner_task_bontas.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_master_plan.md
  - canvases/egyedi_solver/jagua_optimizer_task_index.md
  - codex/prompts/egyedi_solver/jagua_optimizer_master_runner.md
  - codex/reports/egyedi_solver/jagua_optimizer_t03_outer_only_contract_and_hole_gate.md
  - canvases/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
- name: Valós rectangular sheet provider boundary audit rögzítése
  description: 'Auditáld a valós JG-03/JG-04 utáni kódot: docs/solver_io_contract.md, rust/vrs_solver/src/sheet.rs,
    io.rs, item.rs, adapter.rs, optimizer/mod.rs, main.rs, vrs_nesting/runner/vrs_solver_runner.py, vrs_nesting/nesting/instances.py,
    scripts/validate_nesting_solution.py és scripts/check.sh. Dokumentáld a reportban a tényleges sheet expansion,
    sheet_index és validator boundary működést. Ne találj ki új modulneveket vagy nem létező API-t.'
  inputs:
  - docs/solver_io_contract.md
  - rust/vrs_solver/src/sheet.rs
  - rust/vrs_solver/src/io.rs
  - rust/vrs_solver/src/item.rs
  - rust/vrs_solver/src/adapter.rs
  - rust/vrs_solver/src/optimizer/mod.rs
  - rust/vrs_solver/src/main.rs
  - vrs_nesting/runner/vrs_solver_runner.py
  - vrs_nesting/nesting/instances.py
  - scripts/validate_nesting_solution.py
  - scripts/check.sh
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
- name: Rectangular sheet provider contract dokumentálása és minimális Rust regresszió
  description: Dokumentáld vagy erősítsd meg a rectangular sheet provider szerződését. A stock quantity determinisztikusan
    expandált sheet-listát adjon, stabil sheet_index mappinggel. Ha a jelenlegi expand_sheets() már megfelel, ne
    refaktorálj feleslegesen; adj hozzá célzott unit tesztet vagy report evidence-t. Ha módosítás szükséges, minimálisan
    érintsd a sheet.rs/io.rs/adapter.rs/optimizer boundaryt, és ne változtasd meg a rectangular baseline viselkedést
    bizonyíték nélkül.
  inputs:
  - rust/vrs_solver/src/sheet.rs
  - rust/vrs_solver/src/io.rs
  - rust/vrs_solver/src/adapter.rs
  - rust/vrs_solver/src/optimizer/mod.rs
  - docs/solver_io_contract.md
  outputs:
  - rust/vrs_solver/src/sheet.rs
  - docs/solver_io_contract.md
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
- name: Deterministic outer-only rectangular fixture pack létrehozása
  description: Hozd létre a tests/fixtures/egyedi_solver/jagua_rect_smoke.json és tests/fixtures/egyedi_solver/jagua_rect_medium.json
    fixture-öket. Mindkettő legyen contract_version v1, outer-only, gyors és determinisztikus. Legalább az egyik
    tartalmazzon több stock quantity-t, és legyen alkalmas stable sheet_index mapping ellenőrzésre. Margin/gap mezők
    csak akkor kerüljenek aktív contract mezőként a fixture-be, ha a solver IO contract ezt támogatja; különben
    a reportban dokumentáld a DEVIATION-t.
  inputs:
  - docs/solver_io_contract.md
  - rust/vrs_solver/src/io.rs
  - rust/vrs_solver/src/sheet.rs
  outputs:
  - tests/fixtures/egyedi_solver/jagua_rect_smoke.json
  - tests/fixtures/egyedi_solver/jagua_rect_medium.json
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
- name: Rectangular sheet provider smoke script hozzáadása
  description: Hozd létre a scripts/smoke_jagua_rectangular_sheet_provider.py scriptet. A script építsen vagy használjon
    explicit VRS_SOLVER_BIN binárist, futtassa a valid fixture-öket a vrs_solver_runner útvonalon, ellenőrizze az
    exact validátort, a deterministic sheet_index range-et és mappinget, valamint negatív ellenőrzéssel bizonyítsa,
    hogy invalid sheet index / invalid output nem megy át PASS-ként. Ne hagyjon hátra szükségtelen repo-szennyezést.
  inputs:
  - tests/fixtures/egyedi_solver/jagua_rect_smoke.json
  - tests/fixtures/egyedi_solver/jagua_rect_medium.json
  - vrs_nesting/runner/vrs_solver_runner.py
  - scripts/validate_nesting_solution.py
  - rust/vrs_solver/Cargo.toml
  outputs:
  - scripts/smoke_jagua_rectangular_sheet_provider.py
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
- name: Célzott build, unit test és rectangular smoke verifikáció
  description: 'Futtasd és dokumentáld legalább ezeket: cargo build --release --manifest-path rust/vrs_solver/Cargo.toml;
    cargo test --manifest-path rust/vrs_solver/Cargo.toml; python3 scripts/smoke_jagua_rectangular_sheet_provider.py.
    A reportban külön táblázatban szerepeljen: smoke fixture PASS, medium fixture PASS, stable sheet_index PASS,
    invalid output rejected PASS, exact validation PASS.'
  inputs:
  - rust/vrs_solver/Cargo.toml
  - scripts/smoke_jagua_rectangular_sheet_provider.py
  - tests/fixtures/egyedi_solver/jagua_rect_smoke.json
  - tests/fixtures/egyedi_solver/jagua_rect_medium.json
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
- name: Checklist, progress checklist és report véglegesítése
  description: Frissítsd a task-specifikus checklistet és a globális jagua_optimizer_task_progress_checklist.md
    JG-05 szakaszát kizárólag bizonyíték alapján. A report tartalmazza a dependency evidence-t, diff összefoglalót,
    fixture listát, futtatási parancsokat, validator evidence-t, margin/gap státuszt és JG-06 indíthatóságát. PASS
    csak akkor adható, ha minden acceptance gate teljesült és a checklist pontok pipálva vagy explicit DEVIATION/BLOCKED
    megjegyzéssel ellátva vannak.
  inputs:
  - codex/codex_checklist/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md
  outputs:
  - codex/codex_checklist/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
- name: Repo gate (automatikus verify)
  description: 'Futtasd a standard ellenőrzést és frissítsd automatikusan a reportot. Parancs: ./scripts/verify.sh
    --report codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md. A verify
    logot a wrapper a megfelelő .verify.log útvonalra menti. PASS csak zöld verify esetén adható; dependency vagy
    környezeti blocker esetén REVISE/BLOCKED.'
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.md
  - codex/reports/egyedi_solver/jagua_optimizer_t05_rectangular_sheet_provider_and_fixtures.verify.log
