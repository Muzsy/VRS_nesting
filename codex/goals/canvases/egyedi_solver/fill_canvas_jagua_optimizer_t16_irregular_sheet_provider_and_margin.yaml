steps:
  - name: "JG-16 dependency és szabályok ellenőrzése"
    description: >
      Ellenőrizd a JG-15 dependency gate-et: a JG-15 report létezik, első sora PASS vagy PASS_WITH_NOTES,
      tartalmazza a JG-16_STATUS: READY sort, és létezik a docs/egyedi_solver/jagua_irregular_sheet_spike_decision.md
      döntési report. Olvasd el az AGENTS.md, docs/codex/*, docs/qa/testing_guidelines.md és a jagua optimizer
      tervdokumentumokat. Ha bármely dependency hiányzik, zárj BLOCKED státusszal, és ne módosíts provider runtime kódot.
    inputs:
      - "AGENTS.md"
      - "docs/codex/overview.md"
      - "docs/codex/yaml_schema.md"
      - "docs/codex/report_standard.md"
      - "docs/qa/testing_guidelines.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/deep-research-report.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_canvas_yaml_runner_task_bontas.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_master_plan.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_rs_sajat_optimizer_fejlesztesi_terv.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t15_irregular_sheet_capability_spike.md"
      - "docs/egyedi_solver/jagua_irregular_sheet_spike_decision.md"
    outputs:
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"

  - name: "Valós sheet, margin és validation kód auditálása"
    description: >
      Auditáld a meglévő sheet/model/geometry/adapter/validator kódot. Rögzítsd, hogy Stock.outer_points már létezik,
      SheetShape._outer_poly létezik, rect_inside_sheet_shape jelenleg bbox+hole logikára épül-e, margin_mm/spacing_mm
      jelenleg Rust SolverInput mező-e vagy csak Python validator-only mező, és a Python exact validator hogyan kezeli a
      stock outer_points + margin_mm usable polygon ellenőrzést. A reportban dokumentáld a JG-05 margin deviation hatását.
    inputs:
      - "rust/vrs_solver/src/sheet.rs"
      - "rust/vrs_solver/src/geometry.rs"
      - "rust/vrs_solver/src/adapter.rs"
      - "rust/vrs_solver/src/io.rs"
      - "vrs_nesting/nesting/instances.py"
      - "vrs_nesting/runner/vrs_solver_runner.py"
      - "docs/solver_io_contract.md"
    outputs:
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"

  - name: "Irregular sheet provider és model contract implementálása"
    description: >
      Vezesd be vagy pontosítsd a sheet provider/model contractot irregular/remnant stock outer polygon támogatásra. A modell
      tárolja az original outer polygon, bbox és shape metadata adatait. Alakíts ki usable polygon vagy conservative usable
      boundary policy-t a JG-15 döntési report szerint. Container holes továbbra sem támogatottak: non-empty holes_points nem
      lehet silent ignore. Ne törd a rectangular stock provider viselkedést és a SolverOutput v1 contractot.
    inputs:
      - "rust/vrs_solver/src/sheet.rs"
      - "rust/vrs_solver/src/geometry.rs"
      - "rust/vrs_solver/src/adapter.rs"
      - "rust/vrs_solver/src/io.rs"
    outputs:
      - "rust/vrs_solver/src/sheet.rs"
      - "rust/vrs_solver/src/geometry.rs"
      - "rust/vrs_solver/src/adapter.rs"
      - "rust/vrs_solver/src/io.rs"

  - name: "Margin policy és too-narrow remnant kezelés rögzítése"
    description: >
      Implementáld vagy explicit unsupported/fallback státusszal dokumentáld a conservative margin kezelést. Ha margin_mm Rust
      runtime mezővé válik, frissítsd a SolverInput parse-olást, a sheet usable region logikát és a contractot. Ha nem válik
      runtime mezővé, akkor marginos irregular input ne legyen sikeresként elfogadva silent ignore mellett. Too-narrow remnant
      adjon determinisztikus unsupported/fail státuszt, pontos reasonnel.
    inputs:
      - "rust/vrs_solver/src/sheet.rs"
      - "rust/vrs_solver/src/io.rs"
      - "docs/solver_io_contract.md"
    outputs:
      - "rust/vrs_solver/src/sheet.rs"
      - "rust/vrs_solver/src/io.rs"
      - "docs/solver_io_contract.md"

  - name: "Irregular margin fixture és smoke script létrehozása"
    description: >
      Hozd létre a hole-free L-shape/remnant fixture-t és a smoke scriptet. A smoke bizonyítsa: rectangular regresszió nincs,
      L-shape/remnant input valid/provider-szinten kezelt, margin utáni usable region adatok riportolhatók, too-narrow remnant
      unsupported/fail, container holes tiltottak, és az exact validator nem enged invalid layoutot successként.
    inputs:
      - "tests/fixtures/egyedi_solver"
      - "scripts"
      - "vrs_nesting/runner/vrs_solver_runner.py"
      - "vrs_nesting/nesting/instances.py"
    outputs:
      - "tests/fixtures/egyedi_solver/jagua_irregular_margin.json"
      - "scripts/smoke_jagua_irregular_sheet_provider.py"

  - name: "Contract dokumentáció és report frissítése"
    description: >
      Frissítsd a docs/solver_io_contract.md dokumentumot a JG-16 valós contracttal: irregular stock outer_points, container hole
      tiltás, margin policy, usable region metadata, unsupported reasonök, runner/validator követelmények. Frissítsd a JG-16
      reportot dependency evidence, implementation summary, shape metadata, futtatott parancsok, risks/blockers és final status
      mezőkkel. Csak valódi PASS esetén írd be: JG-17_STATUS: READY.
    inputs:
      - "docs/solver_io_contract.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"
    outputs:
      - "docs/solver_io_contract.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"

  - name: "Checklist frissítése"
    description: >
      Frissítsd a task-specifikus checklistet és a globális jagua_optimizer_task_progress_checklist.md JG-16 szakaszát.
      Csak olyan pontot pipálj ki, amelyre konkrét bizonyíték van. Ha dependency vagy margin policy miatt eltérés van,
      jelöld BLOCKED/DEVIATION megjegyzéssel, ne pipáld készre hamisan.
    inputs:
      - "codex/codex_checklist/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md"
    outputs:
      - "codex/codex_checklist/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"

  - name: "Célzott tesztek futtatása"
    description: >
      Futtasd a JG-16 célzott ellenőrzéseit: python3 scripts/smoke_jagua_irregular_sheet_provider.py és
      cargo test --manifest-path rust/vrs_solver/Cargo.toml. Ha a JG-15 decision report további smoke-ot ír elő,
      azt is futtasd. Mentsd az eredményeket a reportba. Invalid layout vagy validation_status=fail nem lehet success.
    inputs:
      - "scripts/smoke_jagua_irregular_sheet_provider.py"
      - "rust/vrs_solver/Cargo.toml"
    outputs:
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a standard repo ellenőrzést és frissítsd automatikusan a reportot. Kötelező parancs:
      ./scripts/verify.sh --report codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md. A verify logot mentsd a report mellé.
      Ha dependency vagy környezeti hiba miatt fail, ne rejtsd el: különítsd el, hogy kódhiba, package/import hiba vagy
      environment blocker.
    outputs:
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t16_irregular_sheet_provider_and_margin.verify.log"
