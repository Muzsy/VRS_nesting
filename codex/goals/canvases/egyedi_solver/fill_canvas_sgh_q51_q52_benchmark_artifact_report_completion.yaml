steps:
  - name: "Benchmark artifact reportok potlasa"
    description: >
      A mar letezo SGH-Q51 es SGH-Q52 benchmark summary/input/output/log artefaktumok
      alapjan hozz letre top-level markdown reportokat az artifacts/benchmarks/sgh_qXX/
      mappakba. Ne futtasd ujra a benchmarkokat es ne modosits solver output JSON-t.
    outputs:
      - "canvases/egyedi_solver/sgh_q51_q52_benchmark_artifact_report_completion.md"
      - "codex/goals/canvases/egyedi_solver/fill_canvas_sgh_q51_q52_benchmark_artifact_report_completion.yaml"
      - "artifacts/benchmarks/sgh_q51/q51_report.md"
      - "artifacts/benchmarks/sgh_q52/q52_report.md"

  - name: "SVG es PNG tablatervek generalasa"
    description: >
      A meglevo Q51/Q52 solver output JSON-okbol es input geometriakbol generalj
