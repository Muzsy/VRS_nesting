steps:
  - name: "JG-13 dependency, szabályok és taskforrások olvasása"
    description: >
      Ellenőrizd a JG-12 dependency gate-et: a JG-12 report létezik, első sora PASS, tartalmazza a JG-13_STATUS: READY jelzést,
      a MultiSheetManager modul és smoke script létezik, és a JG-12 report bizonyítja a PASS gate-et. Olvasd el a repo szabályfájlokat,
      a JG tervdokumentációkat, a task indexet, a JG-13 canvast, ezt a YAML-t és a task-specifikus checklistet. Dokumentáld a régi
      fejlesztési terv és az aktuális task-bontás közti eltérést: régi terv szerint JG-13 cavity-prepack, aktuális lánc szerint Sheet
      Elimination V1. Ha a dependency nem PASS, állj meg BLOCKED státusszal és ne módosíts solver kódot.
    inputs:
      - "AGENTS.md"
      - "docs/codex/overview.md"
      - "docs/codex/yaml_schema.md"
      - "docs/codex/report_standard.md"
      - "docs/qa/testing_guidelines.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/deep-research-report.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_rs_sajat_optimizer_fejlesztesi_terv.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_canvas_yaml_runner_task_bontas.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_master_plan.md"
      - "canvases/egyedi_solver/jagua_optimizer_task_index.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t12_multi_sheet_manager_v1.md"
      - "canvases/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md"
      - "codex/goals/canvases/egyedi_solver/fill_canvas_jagua_optimizer_t13_sheet_elimination_v1.yaml"
      - "codex/codex_checklist/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md"
    outputs:
      - "codex/reports/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md"

  - name: "Sheet elimination aktuális kódbázis audit"
    description: >
      Auditáld a JG-13-hoz releváns valós Rust és Python kódot. Külön ellenőrizd a MultiSheetManager run flow-t, a repair reinsert
      mintáit, a candidate orderingot, a score breakdown sheet-count mezőit, a LayoutState snapshot lehetőségét, az adapter Phase 1
      wiringot, a Metrics.sheet_count_used max+1 contractot és az exact validation bridge elérhetőségét. Ne hivatkozz nem létező
      API-ra; ha a várt elem hiányzik, a reportban jelöld mismatch/blocker-ként.
    inputs:
      - "rust/vrs_solver/src/optimizer/multisheet.rs"
      - "rust/vrs_solver/src/optimizer/repair.rs"
      - "rust/vrs_solver/src/optimizer/candidates.rs"
      - "rust/vrs_solver/src/optimizer/score.rs"
      - "rust/vrs_solver/src/optimizer/state.rs"
      - "rust/vrs_solver/src/optimizer/moves.rs"
      - "rust/vrs_solver/src/optimizer/stopping.rs"
      - "rust/vrs_solver/src/optimizer/mod.rs"
      - "rust/vrs_solver/src/adapter.rs"
      - "rust/vrs_solver/src/io.rs"
      - "rust/vrs_solver/src/item.rs"
      - "rust/vrs_solver/src/sheet.rs"
      - "vrs_nesting/runner/vrs_solver_runner.py"
      - "scripts/smoke_jagua_multisheet_manager_v1.py"
      - "scripts/smoke_jagua_exact_validation_bridge.py"
    outputs:
      - "codex/reports/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md"

  - name: "SheetElimination V1 modul létrehozása"
    description: >
      Hozd létre a rust/vrs_solver/src/optimizer/sheet_elimination.rs modult. Implementálj SheetEliminationEngine és
      SheetEliminationDiagnostics vagy repo-konform ekvivalens típusokat. A modul tartalmazzon deterministic weakest-sheet selection
      szabályt, sheet summary helper(eke)t, rollback snapshotot, attempt/success/fail metrikákat, és no-random döntéseket. A kiválasztási
      szabályt dokumentáld kódban és reportban. Elsődleges tie-break javaslat: legmagasabb gyenge sheet index preferálása a max+1
      sheet_count_used contract miatt.
    inputs:
      - "rust/vrs_solver/src/optimizer/multisheet.rs"
      - "rust/vrs_solver/src/optimizer/state.rs"
      - "rust/vrs_solver/src/optimizer/score.rs"
      - "rust/vrs_solver/src/io.rs"
    outputs:
      - "rust/vrs_solver/src/optimizer/sheet_elimination.rs"

  - name: "Reinsert és rollback implementáció"
    description: >
      Implementáld a sheet ürítési attemptet: a kiválasztott sheet placementjei kerüljenek deterministic reinsert queue-ba, a többi
      placement maradjon base layoutként, és a reinsert csak a nem eliminált sheetekre próbálkozzon. Használd a meglévő candidate/reinsert
      mintákat vagy közösíts helperként, de ne duplikálj veszélyesen eltérő collision logikát. Commit csak akkor lehetséges, ha minden
      eltávolított item visszakerült, nincs violation/exact validation hiba, és a sheet_count_used csökkent. Minden sikertelen eset rollbackeljen
      az eredeti snapshotra.
    inputs:
      - "rust/vrs_solver/src/optimizer/sheet_elimination.rs"
      - "rust/vrs_solver/src/optimizer/repair.rs"
      - "rust/vrs_solver/src/optimizer/candidates.rs"
      - "rust/vrs_solver/src/optimizer/initializer.rs"
      - "rust/vrs_solver/src/optimizer/stopping.rs"
    outputs:
      - "rust/vrs_solver/src/optimizer/sheet_elimination.rs"

  - name: "Optimizer export és Phase 1 wiring"
    description: >
      Exportáld a sheet_elimination modult az optimizer/mod.rs alatt. Kösd be a JG-13 pass-t a Phase 1 flow-ba a JG-12 MultiSheetManager
      után vagy azon belül, repo-konform módon. A SolverOutput v1 contract mezőit ne nevezd át és ne töröld. Az adapter.rs csak akkor
      módosuljon, ha a wiring ténylegesen ott szükséges; különben dokumentáld, hogy a MultiSheetManager belsejében történt az orchestration.
    inputs:
      - "rust/vrs_solver/src/optimizer/mod.rs"
      - "rust/vrs_solver/src/optimizer/multisheet.rs"
      - "rust/vrs_solver/src/optimizer/sheet_elimination.rs"
      - "rust/vrs_solver/src/adapter.rs"
      - "rust/vrs_solver/src/io.rs"
    outputs:
      - "rust/vrs_solver/src/optimizer/mod.rs"
      - "rust/vrs_solver/src/optimizer/multisheet.rs"
      - "rust/vrs_solver/src/adapter.rs"

  - name: "Sheet elimination unit és regression tesztek"
    description: >
      Adj Rust unit teszteket a SheetElimination V1-hez: weakest sheet selection deterministic, tie-break stable, successful elimination
      csökkenti sheet_count_used értéket, sikertelen attempt rollbackel, rollback után placements/unplaced változatlan, invalid layout nem
      success, stopping policy működik, és JG-12 multi-sheet invariánsok nem sérülnek. A tesztek ne gyengítsék az exact/violation gate-et.
    inputs:
      - "rust/vrs_solver/src/optimizer/sheet_elimination.rs"
      - "rust/vrs_solver/src/optimizer/multisheet.rs"
      - "rust/vrs_solver/src/optimizer/repair.rs"
      - "rust/vrs_solver/src/optimizer/score.rs"
    outputs:
      - "rust/vrs_solver/src/optimizer/sheet_elimination.rs"

  - name: "JG-13 sheet elimination smoke script"
    description: >
      Hozd létre a scripts/smoke_jagua_sheet_elimination_v1.py scriptet. A smoke bizonyítsa mesterséges rectangular fixture-rel, hogy
      legalább egy sheet eliminálható, successful elimination esetén sheet_count_used csökken, sikertelen elimináció rollbackel és nem rontja
      a valid layoutot, attempt/success/fail metrikák ellenőrizhetők, azonos input determinisztikus eredményt ad, és JG-12 multi-sheet smoke
      nem regresszál. Futtasd az exact validation bridge-et, ha elérhető.
    inputs:
      - "scripts/smoke_jagua_multisheet_manager_v1.py"
      - "scripts/smoke_jagua_exact_validation_bridge.py"
      - "vrs_nesting/runner/vrs_solver_runner.py"
    outputs:
      - "scripts/smoke_jagua_sheet_elimination_v1.py"

  - name: "Task checklist, progress checklist és report frissítése"
    description: >
      Frissítsd a JG-13 task-specifikus checklistet és a globális jagua optimizer progress checklist JG-13 szakaszát. Csak bizonyítottan
      teljesült pontot pipálj ki. Töltsd ki a reportot dependency evidence-szel, source-of-truth mismatch megjegyzéssel, real code audittal,
      weakest sheet rule-lal, rollback evidence-szel, attempt/success/fail metrikákkal, exact validation evidence-szel és teszteredményekkel.
      Csak akkor írd a report végére, hogy JG-14_STATUS: READY, ha minden gate PASS.
    outputs:
      - "codex/codex_checklist/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md"
      - "canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md"

  - name: "Repo gate automatikus verify"
    description: >
      Futtasd a standard repo ellenőrzést és mentsd a logot: ./scripts/verify.sh --report
      codex/reports/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md. Emellett dokumentáld a task-specifikus parancsokat:
      cargo build --manifest-path rust/vrs_solver/Cargo.toml; cargo test --manifest-path rust/vrs_solver/Cargo.toml; cargo test
      --manifest-path rust/vrs_solver/Cargo.toml optimizer::sheet_elimination; python3 scripts/smoke_jagua_multisheet_manager_v1.py;
      python3 scripts/smoke_jagua_sheet_elimination_v1.py; python3 scripts/smoke_jagua_exact_validation_bridge.py. Ha bármelyik
      környezeti okból elakad, a report legyen REVISE/BLOCKED, ne PASS.
    outputs:
      - "codex/reports/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.md"
      - "codex/reports/egyedi_solver/jagua_optimizer_t13_sheet_elimination_v1.verify.log"
