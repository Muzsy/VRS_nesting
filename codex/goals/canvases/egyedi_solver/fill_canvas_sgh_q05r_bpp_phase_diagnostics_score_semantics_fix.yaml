steps:
  - name: "Dependency gate és Q05 kódaudit rögzítése"
    description: >
      Ellenőrizd, hogy az SGH-Q05 report létezik és első sora PASS. Olvasd el az AGENTS.md,
      docs/codex/overview.md, docs/codex/yaml_schema.md, docs/codex/report_standard.md,
      docs/qa/testing_guidelines.md, docs/egyedi_solver/sgh_q05_bpp_phase_loop_contract.md,
      valamint a Q05 canvas/YAML/report fájlokat. Rögzítsd a checklistben, hogy Q05 core BPP loop működik,
      de a Q05R két javítási pontja: BppPhaseDiagnostics teljessége és PhaseResult.best_score semantics.
    outputs:
      - "codex/codex_checklist/egyedi_solver/sgh_q05r_bpp_phase_diagnostics_score_semantics_fix.md"
      - "codex/reports/egyedi_solver/sgh_q05r_bpp_phase_diagnostics_score_semantics_fix.md"

  - name: "BppPhaseDiagnostics bővítése"
    description: >
      Bővítsd a rust/vrs_solver/src/optimizer/bpp_phase.rs diagnosztikáját initial_score, best_score és
      per_attempt Vec<SheetEliminationDiagnostics> mezőkkel. A BppPhase használja a ScoreModel-t a PhaseConfig.score_weights
      alapján. Minden SheetEliminationEngine::run() eredmény diagját mentse per_attempt-be. A best_score csak ténylegesen
      látott/committed incumbent layout score-ja lehet; ne legyen fiktív.
    outputs:
      - "rust/vrs_solver/src/optimizer/bpp_phase.rs"

  - name: "PhaseResult best_score semantics javítása"
    description: >
      Javítsd a rust/vrs_solver/src/optimizer/phase.rs PhaseOptimizer::run() kódját úgy, hogy a PhaseResult.score és
      PhaseResult.best_score ne állítson egymásnak ellent. Minimum elfogadás: PhaseResult.best_score == final_score.total_cost.
      Ha a best-seen during exploration/compression/BPP információt meg akarod tartani, azt csak diagnostics/report szinten
      dokumentáld, ne a PhaseResult.best_score mezőben, amíg nincs hozzá visszaadott layout vagy külön best_seen_score mező.
      Javítsd a félrevezető kommentet is.
    outputs:
      - "rust/vrs_solver/src/optimizer/phase.rs"

  - name: "Célzott Rust regression tesztek szigorítása"
    description: >
      Adj vagy szigoríts célzott teszteket bpp_phase.rs és phase.rs alatt: a 3 item / 3 sheet fixture bizonyítsa a valódi iteratív
      sheet reductiont final sheet count 1 vagy successful_eliminations >= 2 elvárással; diagnostics attempts == per_attempt.len();
      diagnostics score mezők tényleges input/committed layout score-ok; PhaseResult.best_score == PhaseResult.score.total_cost
      Q05R után. A tesztek legyenek determinisztikusak és kis fixture-ösek.
    outputs:
      - "rust/vrs_solver/src/optimizer/bpp_phase.rs"
      - "rust/vrs_solver/src/optimizer/phase.rs"

  - name: "Q05 contract dokumentáció és report frissítése"
    description: >
      Frissítsd a docs/egyedi_solver/sgh_q05_bpp_phase_loop_contract.md dokumentumot a BppPhaseDiagnostics mezőkkel,
      per_attempt audit szerepével, valamint a PhaseResult.score / PhaseResult.best_score jelentésével. Hozd létre a Q05R
      reportot és checklistet Report Standard v2 szerint, DoD -> Evidence matrixszal és verify evidence-szel.
    outputs:
      - "docs/egyedi_solver/sgh_q05_bpp_phase_loop_contract.md"
      - "codex/codex_checklist/egyedi_solver/sgh_q05r_bpp_phase_diagnostics_score_semantics_fix.md"
      - "codex/reports/egyedi_solver/sgh_q05r_bpp_phase_diagnostics_score_semantics_fix.md"

  - name: "Repo gate automatikus verify"
    description: >
      Futtasd: cargo test --manifest-path rust/vrs_solver/Cargo.toml optimizer::bpp_phase,
      cargo test --manifest-path rust/vrs_solver/Cargo.toml optimizer::phase, majd cargo test --manifest-path
      rust/vrs_solver/Cargo.toml --lib. Végül futtasd: ./scripts/verify.sh --report
      codex/reports/egyedi_solver/sgh_q05r_bpp_phase_diagnostics_score_semantics_fix.md. Ha bármelyik fail, a report első sora
      REVISE vagy BLOCKED legyen, és ne legyen SGH-Q06_STATUS marker. Ha minden zöld, a report első sora PASS, és a report végén
      szerepeljen: SGH-Q06_STATUS: READY.
    outputs:
      - "codex/reports/egyedi_solver/sgh_q05r_bpp_phase_diagnostics_score_semantics_fix.md"
      - "codex/reports/egyedi_solver/sgh_q05r_bpp_phase_diagnostics_score_semantics_fix.verify.log"
