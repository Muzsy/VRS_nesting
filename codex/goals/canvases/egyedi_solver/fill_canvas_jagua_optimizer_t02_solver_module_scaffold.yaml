steps:
- name: Repo szabályok, JG tervdokumentáció és JG-02 taskforrások olvasása
  description: 'Olvasd el és tartsd be az AGENTS.md, docs/codex/overview.md, docs/codex/yaml_schema.md,
    docs/codex/report_standard.md és docs/qa/testing_guidelines.md fájlokat. Olvasd
    el a jagua-rs saját optimizer tervdokumentációit, a JG task indexet, a JG-01 source
    auditot és ezt a JG-02 canvast. Nyerd ki a JG-02 pontos taskdefinícióját a task
    bontásból és progress checklistből. Ha JG-01 nem PASS vagy a source audit nem
    tartalmaz JG-02_STATUS: READY jelzést, állj meg BLOCKED státusszal.'
  inputs:
  - AGENTS.md
  - docs/codex/overview.md
  - docs/codex/yaml_schema.md
  - docs/codex/report_standard.md
  - docs/qa/testing_guidelines.md
  - canvases/jagua_rs_sajat_optimizer/plan/deep-research-report.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_rs_sajat_optimizer_fejlesztesi_terv.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_canvas_yaml_runner_task_bontas.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_master_plan.md
  - canvases/egyedi_solver/jagua_optimizer_task_index.md
  - codex/prompts/egyedi_solver/jagua_optimizer_master_runner.md
  - docs/egyedi_solver/jagua_optimizer_source_audit.md
  - canvases/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
- name: Baseline viselkedés rögzítése refaktor előtt
  description: 'Dokumentáld a jelenlegi rust/vrs_solver/src/main.rs baseline viselkedését:
    DTO-k, sheet expand sorrend, instance expand és sort, allowed rotations, row/cursor
    placement, hole-aware sheet boundary check, output contract. Építsd a jelenlegi
    binaryt, futtasd a meglévő vrs_solver smoke inputot vagy a repo vrs_solver_runner
    útvonalát, és mentsd/reportold a baseline solver_output normalizált JSON lényegét.
    Ne módosíts kódot ebben a lépésben.'
  inputs:
  - rust/vrs_solver/Cargo.toml
  - rust/vrs_solver/src/main.rs
  - scripts/check.sh
  - vrs_nesting/runner/vrs_solver_runner.py
  - vrs_nesting/nesting/instances.py
  - scripts/validate_nesting_solution.py
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
- name: IO, geometry, sheet és item modulok leválasztása
  description: Refaktoráld a monolit main.rs releváns típusait és helper függvényeit
    külön modulokba viselkedésváltozás nélkül. Az IO contract mezőnevei és serde kompatibilitás
    nem változhat. A sheet és item expand sorrend stabil maradjon. A geometry helper
    funkciók jagua-rs primitív használata ne változzon. Csak az outputs listában szereplő
    fájlokat módosítsd/hozd létre.
  inputs:
  - rust/vrs_solver/src/main.rs
  - docs/solver_io_contract.md
  - docs/egyedi_solver/jagua_optimizer_source_audit.md
  outputs:
  - rust/vrs_solver/src/main.rs
  - rust/vrs_solver/src/io.rs
  - rust/vrs_solver/src/geometry.rs
  - rust/vrs_solver/src/sheet.rs
  - rust/vrs_solver/src/item.rs
- name: Adapter és optimizer baseline modul kialakítása
  description: Válaszd le a main.rs-ből a solver orchestrationt és a jelenlegi row/cursor
    baseline placement mechanikát. Hozz létre adapter szintű solve(input) jellegű
    belső API-t, és helyezd a row/cursor mechanikát az optimizer/mod.rs alá. Ne implementálj
    új optimizer algoritmust, score modellt, candidate generationt, SA-t vagy Sparrow-style
    search loopot. Jagua-rs magasabb szintű adapter még nem cél.
  inputs:
  - rust/vrs_solver/src/main.rs
  - rust/vrs_solver/Cargo.toml
  - docs/egyedi_solver/jagua_optimizer_source_audit.md
  outputs:
  - rust/vrs_solver/src/main.rs
  - rust/vrs_solver/src/adapter.rs
  - rust/vrs_solver/src/optimizer/mod.rs
- name: Build, output-equivalence és exact validation ellenőrzés
  description: 'Futtasd a Rust buildet és a meglévő smoke/validator útvonalakat. Kötelező
    minimum: cargo build --release --manifest-path rust/vrs_solver/Cargo.toml. Ha
    vannak releváns Rust unit tesztek, futtasd őket. Futtasd ugyanazt a baseline smoke
    inputot refaktor után, és hasonlítsd össze a normalizált JSON outputot. Futtasd
    a scripts/validate_nesting_solution.py validátort a keletkezett run-dirre. A reportban
    legyen explicit NO/YES táblázat minden viselkedésváltozásról.'
  inputs:
  - rust/vrs_solver/Cargo.toml
  - rust/vrs_solver/src/main.rs
  - rust/vrs_solver/src/io.rs
  - rust/vrs_solver/src/geometry.rs
  - rust/vrs_solver/src/sheet.rs
  - rust/vrs_solver/src/item.rs
  - rust/vrs_solver/src/adapter.rs
  - rust/vrs_solver/src/optimizer/mod.rs
  - scripts/validate_nesting_solution.py
  - vrs_nesting/runner/vrs_solver_runner.py
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
- name: Checklist, progress checklist és report véglegesítése
  description: Frissítsd a task-specifikus checklistet és a globális jagua_optimizer_task_progress_checklist.md
    JG-02 szakaszát kizárólag bizonyíték alapján. A report tartalmazza a diff összefoglalót,
    baseline/refaktor output összehasonlítást, futtatott parancsokat, esetleges környezeti
    blokkolókat, és JG-03 indíthatóságát. Ha a validation.rs mismatch döntést igényelt,
    azt REQUIRES_DECISION blokkban dokumentáld.
  inputs:
  - codex/codex_checklist/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md
  outputs:
  - codex/codex_checklist/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
  - canvases/jagua_rs_sajat_optimizer/plan/jagua_optimizer_task_progress_checklist.md
  - codex/reports/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
- name: Repo gate (automatikus verify)
  description: 'Futtasd a standard ellenőrzést és frissítsd automatikusan a reportot.
    Parancs: ./scripts/verify.sh --report codex/reports/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md.
    A verify logot a wrapper a megfelelő .verify.log útvonalra menti. PASS csak zöld
    verify vagy explicit, bizonyított környezeti blocker esetén adható, utóbbi esetben
    nem tiszta PASS.'
  outputs:
  - codex/reports/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.md
  - codex/reports/egyedi_solver/jagua_optimizer_t02_solver_module_scaffold.verify.log
