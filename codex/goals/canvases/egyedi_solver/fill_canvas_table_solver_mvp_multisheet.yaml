steps:
  - name: "Felderites es canvas veglegesitese"
    description: >
      Ellenorizd a backlogban rogzitett P0 kovetelmenyeket es a meglvo runner
      komponenseket, majd pontositsd a canvasban a multi-sheet MVP solver
      scope-jat, DoD-jat es kockazatkezeleset.
    outputs:
      - "canvases/egyedi_solver/table_solver_mvp_multisheet.md"

  - name: "Implementacios lepesek vegrehajtasa"
    description: >
      Hozd letre a rust/vrs_solver MVP strukturat, valositsd meg az instance
      placement outputot es a multi-sheet iteracios ciklust. Integrald a futast
      a Python oldalrol a runner retegen keresztul.
    outputs:
      - "rust/vrs_solver"
      - "vrs_nesting/nesting/instances.py"
      - "vrs_nesting/runner/vrs_solver_runner.py"

  - name: "Checklist + report vaz letrehozasa"
    description: >
      Keszitsd el a task checklistjet es reportjat, a report standard szerinti
      fejezetekkel es DoD -> Evidence matrix vazzal.
    outputs:
      - "codex/codex_checklist/egyedi_solver/table_solver_mvp_multisheet.md"
      - "codex/reports/egyedi_solver/table_solver_mvp_multisheet.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a standard ellenorzest wrapperrel.
      Parancs: ./scripts/verify.sh --report codex/reports/egyedi_solver/table_solver_mvp_multisheet.md
    outputs:
      - "codex/reports/egyedi_solver/table_solver_mvp_multisheet.md"
      - "codex/reports/egyedi_solver/table_solver_mvp_multisheet.verify.log"
