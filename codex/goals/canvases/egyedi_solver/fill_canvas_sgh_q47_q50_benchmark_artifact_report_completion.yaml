steps:
  - name: "Benchmark artifact reportok potlasa"
    description: >
      A mar letezo SGH-Q47, SGH-Q48, SGH-Q49 es SGH-Q50 benchmark summary/input/output/log
      artefaktumok alapjan hozz letre Q42 mintaju, top-level markdown reportokat az
      artifacts/benchmarks/sgh_qXX/ mappakba. Ne futtasd ujra a benchmarkokat es ne modosits
      solver output JSON-t.
    outputs:
      - "canvases/egyedi_solver/sgh_q47_q50_benchmark_artifact_report_completion.md"
      - "codex/goals/canvases/egyedi_solver/fill_canvas_sgh_q47_q50_benchmark_artifact_report_completion.yaml"
      - "artifacts/benchmarks/sgh_q47/q47_report.md"
      - "artifacts/benchmarks/sgh_q48/q48_report.md"
      - "artifacts/benchmarks/sgh_q49/q49_report.md"
      - "artifacts/benchmarks/sgh_q50/q50_report.md"

  - name: "SVG es PNG tablatervek generalasa"
