      A meglevo Q47-Q50 A/B solver output JSON-okbol es input geometriakbol generalj
      Q42-szeru per-sheet SVG es PNG tablaterveket, valamint render_manifest.json
      fajlokat. Ne futtasd ujra a solver benchmarkokat.
    outputs:
