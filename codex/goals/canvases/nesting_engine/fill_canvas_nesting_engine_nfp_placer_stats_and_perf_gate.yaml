# codex/goals/canvases/nesting_engine/fill_canvas_nesting_engine_nfp_placer_stats_and_perf_gate.yaml

steps:
  - name: "Felderítés: jelenlegi F2-3 stat/perf hiányok rögzítése"
    description: >
      Olvasd el:
      - AGENTS.md
      - docs/nesting_engine/f2_3_nfp_placer_spec.md (stat/perf elvárás részek)
      - scripts/check.sh (nesting_engine F0–F4 smoke blokkok)
      - rust/nesting_engine/src/main.rs
      - rust/nesting_engine/src/multi_bin/greedy.rs
      - rust/nesting_engine/src/placement/nfp_placer.rs
      - rust/nesting_engine/src/nfp/cfr.rs

      A canvasban rögzítsd tömören:
      - most nincs determinisztikus stats output (machine-parsable)
      - nincs baseline alapú counter gate
      - a gate-et a check.sh nesting_engine smoke blokkba kell bekötni
    outputs:
      - "canvases/nesting_engine/nesting_engine_nfp_placer_stats_and_perf_gate.md"

  - name: "Rust: NFP stats összegyűjtése és stderr emission (env varral)"
    description: >
      Implementáld a NFP statokat úgy, hogy ne módosítsa a v2 JSON outputot.

      Kötelező változtatások:
      - rust/nesting_engine/src/placement/nfp_placer.rs:
        - NfpPlacerStatsV1 (Default + mezők)
        - nfp_place(...) kapjon &mut NfpPlacerStatsV1 paramétert, és töltse a countereket:
          cache hit/miss (vagy explicit számlálás a cache ágban),
          nfp_compute_calls (cache miss ág),
          cfr_calls,
          candidate before/after dedupe, after cap, cap_applied_count.
      - rust/nesting_engine/src/nfp/cfr.rs:
        - minimal instrumentation a union/diff call számlálásra (CfrStatsV1)
        - nfp_placerből átadható legyen egy stats mut ref vagy wrapper fn.
      - rust/nesting_engine/src/multi_bin/greedy.rs:
        - greedy_multi_sheet térjen vissza (MultiSheetResult, Option<NfpPlacerStatsV1>)
        - multi-sheet aggregáció: nfp körök statjait összeadni.
      - rust/nesting_engine/src/main.rs:
        - run_nest hívja az új greedy_multi_sheet aláírást
        - ha env: NESTING_ENGINE_EMIT_NFP_STATS=1, akkor stderr-re írja:
          "NEST_NFP_STATS_V1 {json}"
        - a build_output_v2 maradjon változatlan (ne kerüljenek statok az output JSON-ba)

      Figyelj:
      - csak integer counterek (nincs időmérés)
      - determinisztikus növelés (nincs HashMap iteráció, nincs RNG)
    outputs:
      - "rust/nesting_engine/src/placement/nfp_placer.rs"
      - "rust/nesting_engine/src/nfp/cfr.rs"
      - "rust/nesting_engine/src/multi_bin/greedy.rs"
      - "rust/nesting_engine/src/main.rs"

  - name: "Perf gate baseline + smoke script"
    description: >
      Hozd létre a perf gate baseline fájlt és a smoke scriptet.

      - scripts/smoke_nfp_placer_stats_and_perf_gate.py:
        - --record: futtatja a fixture-ket, kiolvassa stderr-ből a NEST_NFP_STATS_V1 JSON-t,
          és létrehozza/frissíti a baseline json-t (max = mért érték).
        - --check: lefuttatja és ellenőrzi: current <= baseline.max minden kulcsra.

      - poc/nesting_engine/f2_3_nfp_perf_gate_baselines.json:
        - version mező
        - fixtures lista: id + path + max

      A script futtatáskor az env var-t állítsa be:
      NESTING_ENGINE_EMIT_NFP_STATS=1
    outputs:
      - "scripts/smoke_nfp_placer_stats_and_perf_gate.py"
      - "poc/nesting_engine/f2_3_nfp_perf_gate_baselines.json"

  - name: "Check gate bekötés (scripts/check.sh)"
    description: >
      A scripts/check.sh nesting_engine blokkban, a már meglévő F0–F4 determinism smoke-ok után
      hívd meg a perf gate-et:

      python3 scripts/smoke_nfp_placer_stats_and_perf_gate.py --check \
        --bin "$NESTING_ENGINE_BIN_PATH" \
        --baseline "poc/nesting_engine/f2_3_nfp_perf_gate_baselines.json"

      A scriptnek FAIL-lel kell kilépnie regresszió esetén.
    outputs:
      - "scripts/check.sh"

  - name: "Doksi frissítés (spec) + checklist + report"
    description: >
      Frissítsd a docs/nesting_engine/f2_3_nfp_placer_spec.md stat/perf részét:
      - mi a stats sor formátum (NEST_NFP_STATS_V1 + JSON)
      - hogyan recordoljuk a baseline-t
      - mit ellenőriz a gate (fixtures + counterek)

      Hozd létre:
      - codex/codex_checklist/... pipálható DoD
      - codex/reports/... Report Standard v2 + AUTO_VERIFY blokk (üresen hagyva)
    outputs:
      - "docs/nesting_engine/f2_3_nfp_placer_spec.md"
      - "codex/codex_checklist/nesting_engine/nesting_engine_nfp_placer_stats_and_perf_gate.md"
      - "codex/reports/nesting_engine/nesting_engine_nfp_placer_stats_and_perf_gate.md"

  - name: "Baseline felvétel + repo gate (verify)"
    description: >
      1) Generáld le a baseline-t record módban:
         python3 scripts/smoke_nfp_placer_stats_and_perf_gate.py --record \
           --bin rust/nesting_engine/target/release/nesting_engine \
           --baseline poc/nesting_engine/f2_3_nfp_perf_gate_baselines.json

      2) Futtasd a verify wrappert:
         ./scripts/verify.sh --report codex/reports/nesting_engine/nesting_engine_nfp_placer_stats_and_perf_gate.md
    outputs:
      - "poc/nesting_engine/f2_3_nfp_perf_gate_baselines.json"
      - "codex/reports/nesting_engine/nesting_engine_nfp_placer_stats_and_perf_gate.md"
      - "codex/reports/nesting_engine/nesting_engine_nfp_placer_stats_and_perf_gate.verify.log"