steps:
  - name: "Repo szabályok és T07/T08 előfeltétel ellenőrzése"
    description: >
      Olvasd el és tartsd be az AGENTS.md, docs/codex/overview.md,
      docs/codex/yaml_schema.md, docs/codex/report_standard.md és
      docs/qa/testing_guidelines.md szabályait. Ellenőrizd, hogy a T07 és T08
      reportok léteznek, státuszuk PASS vagy PASS_WITH_NOTES. Ha bármelyik
      hiányzik vagy FAIL/BLOCKED, ne módosíts production kódot, hanem készíts
      T09 BLOCKED reportot. A T07 tmp artefakt hiánya nem blocker, ha a T07
      report tartalmazza a handoffot.
    inputs:
      - "AGENTS.md"
      - "docs/codex/overview.md"
      - "docs/codex/yaml_schema.md"
      - "docs/codex/report_standard.md"
      - "docs/qa/testing_guidelines.md"
      - "canvases/nesting_engine/lv8_density_task_index.md"
      - "codex/prompts/nesting_engine/lv8_density_master_runner.md"
      - "canvases/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.md"
      - "codex/goals/canvases/nesting_engine/fill_canvas_lv8_density_t09_phase1_shape_id_cache_key_verification.yaml"
      - "codex/reports/nesting_engine/lv8_density_t07_phase1_0_cache_path_discovery_spike.md"
      - "codex/reports/nesting_engine/lv8_density_t08_phase1_cache_stats_hardening.md"
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.md"

  - name: "Cache-key és shape_id invariáns tesztek hozzáadása"
    description: >
      Hozz létre új integration tesztet rust/nesting_engine/tests/nfp_cache_key_invariants.rs
      néven. A teszt gyors és determinisztikus legyen, ne számoljon valódi NFP-t,
      ne igényeljen CGAL binárist és ne fusson hosszú benchmarkot. Fedje legalább
      ezeket az invariánsokat: shape_id változik polygon coordinate/spacing-like
      változásra; shape_id stabil equivalent boundary esetén; holes beleszámítanak;
      equivalent holes canonicalization stabil; cache-key szeparál kernel szerint;
      cache-key szeparál rotation_steps_b szerint; cache-key order-sensitive marad.
    inputs:
      - "rust/nesting_engine/src/nfp/cache.rs"
    outputs:
      - "rust/nesting_engine/tests/nfp_cache_key_invariants.rs"

  - name: "Minimális cache-key javítás csak bizonyított hiba esetén"
    description: >
      Futtasd a célzott invariáns teszteket. Ha minden invariáns zöld, ne módosítsd
      a production cache-key szemantikát. Ha egy invariáns bukik, csak a minimális
      javítást végezd el a rust/nesting_engine/src/nfp/cache.rs és szükség esetén
      rust/nesting_engine/src/placement/nfp_placer.rs fájlokon. Tilos LRU-t,
      benchmarkot, placement algoritmust, scoringot, quality profile-t vagy SA/LNS
      logikát módosítani. Minden production módosítást indokolj a reportban.
    inputs:
      - "rust/nesting_engine/tests/nfp_cache_key_invariants.rs"
      - "rust/nesting_engine/src/nfp/cache.rs"
      - "rust/nesting_engine/src/placement/nfp_placer.rs"
    outputs:
      - "rust/nesting_engine/src/nfp/cache.rs"
      - "rust/nesting_engine/src/placement/nfp_placer.rs"
      - "rust/nesting_engine/tests/nfp_cache_key_invariants.rs"

  - name: "Report és checklist kitöltése cache-key decision matrixszal"
    description: >
      Készítsd el a T09 checklistet és reportot. A report tartalmazzon Cache-key
      decision matrix táblázatot az összes invariáns eredményével, konkrét fájl/sor
      bizonyítékokkal. A report végén explicit szerepeljen:
      pipeline_version_required: YES | NO | DEFERRED. Ha a döntés YES vagy
      DEFERRED, írj konkrét follow-upot T10 előttre. Ha NO, indokold, hogy a
      polygon-hash + kernel + rotation + order-sensitive key elégséges.
    outputs:
      - "codex/codex_checklist/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.md"
      - "codex/reports/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a célzott ellenőrzéseket és a standard repo gate-et. Kötelező célzott
      parancsok: cargo check -p nesting_engine; cargo test -p nesting_engine --test
      nfp_cache_key_invariants -- --nocapture; cargo test -p nesting_engine nfp::cache
      -- --nocapture. Végül futtasd: ./scripts/verify.sh --report
      codex/reports/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.md.
      A verify logot a report mellé kell menteni, és a report AUTO_VERIFY blokkja
      frissüljön.
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.md"
      - "codex/reports/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.verify.log"
