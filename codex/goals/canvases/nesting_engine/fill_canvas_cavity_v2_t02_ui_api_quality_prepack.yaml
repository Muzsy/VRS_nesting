steps:
  - name: "Task artefaktok és kontextus olvasása"
    description: >
      Olvasd el a frontend/src/lib/types.ts (QualityProfileName union, ~sor 372;
      cavity_prepack_summary ~sor 355), frontend/src/pages/NewRunPage.tsx
      (quality select, ~sor 795-796) és
      vrs_nesting/config/nesting_quality_profiles.py fájlokat.
      Ellenőrizd, hogy quality_cavity_prepack már szerepel-e a frontend
      típusokban vagy sem.
    outputs:
      - "canvases/nesting_engine/cavity_v2_t02_ui_api_quality_prepack.md"
      - "codex/goals/canvases/nesting_engine/fill_canvas_cavity_v2_t02_ui_api_quality_prepack.yaml"
      - "codex/prompts/nesting_engine/cavity_v2_t02_ui_api_quality_prepack/run.md"

  - name: "frontend/src/lib/types.ts módosítása"
    description: >
      Adjd hozzá a "quality_cavity_prepack" literált a QualityProfileName
      type union-hoz. Bővítsd a cavity_prepack_summary típust a canvas
      specifikációja alapján (legalább: enabled, version,
      cavity_plan_version, virtual_parent_count, internal_placement_count,
      nested_internal_placement_count, used_cavity_count, usable_cavity_count,
      top_level_holes_removed_count, holed_child_proxy_count,
      total_internal_qty, quantity_delta_summary, diagnostics_by_code).
      Csak a types.ts módosítható ebben a lépésben.
    outputs:
      - "frontend/src/lib/types.ts"

  - name: "frontend/src/pages/NewRunPage.tsx módosítása"
    description: >
      Adj hozzá egy <option value="quality_cavity_prepack"> elemet a quality
      profil select listájába (quality_default és quality_aggressive után).
      Az option szövege: "Quality cavity prepack". Ha van leírás/tooltip a
      profil mellé, add hozzá a canvas specifikációja szerinti szöveget.
      Csak a NewRunPage.tsx módosítható ebben a lépésben.
    outputs:
      - "frontend/src/pages/NewRunPage.tsx"

  - name: "TypeScript build ellenőrzés"
    description: >
      Futtasd: cd frontend && npx tsc --noEmit
      Ha TypeScript hiba van, javítsd a types.ts-ben. A build sikeresen
      kell lefusson hibák nélkül.
    outputs: []

  - name: "Checklist és report elkészítése"
    description: >
      Töltsd ki a checklistet és a reportot. Bizonyítsd: QualityProfileName
      union tartalmazza a "quality_cavity_prepack" literált (fájl + sor
      referencia), az option megjelenik a select-ben, TypeScript build hibátlan.
    outputs:
      - "codex/codex_checklist/nesting_engine/cavity_v2_t02_ui_api_quality_prepack.md"
      - "codex/reports/nesting_engine/cavity_v2_t02_ui_api_quality_prepack.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd: ./scripts/verify.sh --report codex/reports/nesting_engine/cavity_v2_t02_ui_api_quality_prepack.md
    outputs:
      - "codex/reports/nesting_engine/cavity_v2_t02_ui_api_quality_prepack.md"
      - "codex/reports/nesting_engine/cavity_v2_t02_ui_api_quality_prepack.verify.log"
