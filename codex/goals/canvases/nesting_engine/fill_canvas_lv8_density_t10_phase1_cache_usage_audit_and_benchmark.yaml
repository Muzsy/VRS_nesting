steps:
  - name: "Repo szabályok és T08/T09 előfeltételek ellenőrzése"
    description: >
      Olvasd el és tartsd be az AGENTS.md, docs/codex/overview.md,
      docs/codex/yaml_schema.md, docs/codex/report_standard.md és
      docs/qa/testing_guidelines.md szabályait. Ellenőrizd, hogy a T08 és T09
      reportok léteznek, státuszuk PASS vagy PASS_WITH_NOTES. Ellenőrizd, hogy
      a T09 reportban pipeline_version_required: NO és
      production_cache_key_changed: false szerepel. Ha bármelyik feltétel hiányzik,
      ne futtass benchmarkot, hanem készíts T10 BLOCKED reportot.
    inputs:
      - "AGENTS.md"
      - "docs/codex/overview.md"
      - "docs/codex/yaml_schema.md"
      - "docs/codex/report_standard.md"
      - "docs/qa/testing_guidelines.md"
      - "canvases/nesting_engine/lv8_density_task_index.md"
      - "codex/prompts/nesting_engine/lv8_density_master_runner.md"
      - "canvases/nesting_engine/lv8_density_t10_phase1_cache_usage_audit_and_benchmark.md"
      - "codex/goals/canvases/nesting_engine/fill_canvas_lv8_density_t10_phase1_cache_usage_audit_and_benchmark.yaml"
      - "codex/reports/nesting_engine/lv8_density_t08_phase1_cache_stats_hardening.md"
      - "codex/reports/nesting_engine/lv8_density_t09_phase1_shape_id_cache_key_verification.md"
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t10_phase1_cache_usage_audit_and_benchmark.md"

  - name: "Phase 1 cache usage matrix script elkészítése"
    description: >
      Hozz létre egy gyors, determinisztikus benchmark-matrix scriptet
      scripts/experiments/lv8_phase1_cache_usage_matrix.py néven. A script a
      meglévő scripts/experiments/lv8_2sheet_claude_search.py harness-t hívja,
      nem duplikálja a solver futtatási logikát. Támogassa a --out-root,
      --time-limit-sec, --seed, --include-lv8-179 és --profiles CLI paramétereket.
      Írjon cache_usage_matrix.json, cache_usage_matrix.md és runs.jsonl outputot
      a megadott out-root alá. Kötelezően normalizálja és reportolja az
      engine_stats cache mezőket, valid_polygon_gate értéket, runtime-ot,
      placed_instances értéket és utilization_pct-t. A script exit code 2/3-mal
      bukjon kötelező fixture vagy kötelező engine_stats hiánya esetén.
    inputs:
      - "scripts/experiments/lv8_2sheet_claude_search.py"
      - "scripts/experiments/lv8_phase0_shadow_run_matrix.py"
      - "vrs_nesting/config/nesting_quality_profiles.py"
      - "tests/fixtures/nesting_engine/ne2_input_lv8jav.json"
      - "poc/nesting_engine/f2_4_sa_quality_fixture_v2.json"
    outputs:
      - "scripts/experiments/lv8_phase1_cache_usage_matrix.py"

  - name: "Cache usage matrix unit tesztek hozzáadása"
    description: >
      Adj hozzá tests/test_lv8_phase1_cache_usage_matrix.py tesztet. A tesztek ne
      futtassanak hosszú Rust engine benchmarkot. Mockolt vagy előre gyártott
      summary.json inputokkal teszteljék a cache hit-rate számítást, a missing
      optional lv8_179 fixture kezelését, a required fixture hiány BLOCKED/exit
      logikát, az engine_stats.available hiány exit 3 logikát, valamint az
      lru_followup_required és phase2a_ready döntések számítását.
    inputs:
      - "scripts/experiments/lv8_phase1_cache_usage_matrix.py"
      - "tests/test_lv8_phase0_shadow_run_matrix.py"
      - "tests/test_lv8_density_engine_stats_export.py"
    outputs:
      - "tests/test_lv8_phase1_cache_usage_matrix.py"

  - name: "Smoke benchmark futtatása és Phase 1 cache usage report elkészítése"
    description: >
      Futtasd a matrix scriptet smoke módban, rövid time-limit-tel. Elsődleges
      parancs: python3 scripts/experiments/lv8_phase1_cache_usage_matrix.py
      --out-root tmp/lv8_density_phase1_cache_usage --time-limit-sec 60 --seed 42
      --include-lv8-179 auto --profiles quality_default_no_sa_shadow,quality_aggressive_no_sa_shadow.
      Ha a környezetben a release binary hiányzik, építsd meg a repo meglévő
      mintája szerint, vagy dokumentáld BLOCKED státuszként. Készíts külön
      Phase 1 eredményriportot codex/reports/nesting_engine/lv8_phase1_cache_usage_result.md
      néven. A riport mondja ki: phase2a_ready, lru_followup_required,
      cache_stats_available_all_required_runs és polygon_gate_available_all_required_runs.
    inputs:
      - "scripts/experiments/lv8_phase1_cache_usage_matrix.py"
      - "tests/fixtures/nesting_engine/ne2_input_lv8jav.json"
      - "poc/nesting_engine/f2_4_sa_quality_fixture_v2.json"
    outputs:
      - "tmp/lv8_density_phase1_cache_usage/cache_usage_matrix.json"
      - "tmp/lv8_density_phase1_cache_usage/cache_usage_matrix.md"
      - "tmp/lv8_density_phase1_cache_usage/runs.jsonl"
      - "codex/reports/nesting_engine/lv8_phase1_cache_usage_result.md"

  - name: "T10 report és checklist kitöltése"
    description: >
      Készítsd el a T10 checklistet és reportot. A report tartalmazzon DoD → Evidence
      Matrix táblázatot, cache usage döntési szekciót, rövid összefoglalót a
      futtatott fixture-ekről és explicit next-task ajánlást. A report végén
      szerepeljen: phase2a_ready: YES | NO | DEFERRED; lru_followup_required:
      YES | NO; cache_stats_available_all_required_runs: YES | NO;
      polygon_gate_available_all_required_runs: YES | NO. Ha bármelyik NO/DEFERRED,
      írd le a T11 előtti blokkert.
    outputs:
      - "codex/codex_checklist/nesting_engine/lv8_density_t10_phase1_cache_usage_audit_and_benchmark.md"
      - "codex/reports/nesting_engine/lv8_density_t10_phase1_cache_usage_audit_and_benchmark.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a célzott ellenőrzéseket és a standard repo gate-et. Kötelező célzott
      parancsok: python3 -m py_compile scripts/experiments/lv8_phase1_cache_usage_matrix.py;
      python3 -m pytest tests/test_lv8_phase1_cache_usage_matrix.py. Végül futtasd:
      ./scripts/verify.sh --report codex/reports/nesting_engine/lv8_density_t10_phase1_cache_usage_audit_and_benchmark.md.
      A verify logot a report mellé kell menteni, és a report AUTO_VERIFY blokkja
      frissüljön.
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t10_phase1_cache_usage_audit_and_benchmark.md"
      - "codex/reports/nesting_engine/lv8_density_t10_phase1_cache_usage_audit_and_benchmark.verify.log"
