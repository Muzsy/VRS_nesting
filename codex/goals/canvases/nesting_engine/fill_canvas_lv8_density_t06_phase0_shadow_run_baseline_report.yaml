steps:
  - name: "Repo szabályok és előfeltételek ellenőrzése"
    description: >
      Olvasd el és tartsd be az AGENTS.md, docs/codex/overview.md,
      docs/codex/yaml_schema.md, docs/codex/report_standard.md és
      docs/qa/testing_guidelines.md szabályait. Ellenőrizd, hogy a T01, T02,
      T03, T04 és T05 reportok léteznek, és mindegyik státusza PASS vagy
      PASS_WITH_NOTES. Ha bármely előfeltétel hiányzik vagy FAIL/BLOCKED,
      ne indíts benchmarkot, hanem hozz létre T06 FAIL/BLOCKED reportot.
    inputs:
      - "AGENTS.md"
      - "docs/codex/overview.md"
      - "docs/codex/yaml_schema.md"
      - "docs/codex/report_standard.md"
      - "docs/qa/testing_guidelines.md"
      - "codex/reports/nesting_engine/development_plan_packing_density_20260515.md"
      - "canvases/nesting_engine/lv8_density_task_index.md"
      - "codex/prompts/nesting_engine/lv8_density_master_runner.md"
      - "codex/reports/nesting_engine/lv8_density_t01_phase0_fixture_inventory.md"
      - "codex/reports/nesting_engine/lv8_density_t02_phase0_quality_profile_shadow_switch.md"
      - "codex/reports/nesting_engine/lv8_density_t03_phase0_nfp_diag_gate.md"
      - "codex/reports/nesting_engine/lv8_density_t04_phase0_engine_stats_export.md"
      - "codex/reports/nesting_engine/lv8_density_t05_phase0_polygon_validation_gate.md"
      - "canvases/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"
      - "codex/goals/canvases/nesting_engine/fill_canvas_lv8_density_t06_phase0_shadow_run_baseline_report.yaml"
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"

  - name: "Fixture és profile matrix újraellenőrzése"
    description: >
      Ellenőrizd a friss snapshot alapján a T06 fixture és profile matrixot.
      Rögzítsd a reportban a létező és hiányzó pathokat: LV8 276 fixture,
      LV8 179 fixture, small synthetic SA guard fixture, contract-freeze smoke
      anchorok. Importáld és írd ki a get_phase0_shadow_profile_pairs() mappingot.
      Ha az LV8 179 tmp fixture hiányzik, ne gyárts placeholdert; rögzítsd
      fixture_missing sorban, és a hard-cut decision legfeljebb DEFER_HARD_CUT lehet.
    inputs:
      - "vrs_nesting/config/nesting_quality_profiles.py"
      - "tests/fixtures/nesting_engine/ne2_input_lv8jav.json"
      - "poc/nesting_engine/f2_4_sa_quality_fixture_v2.json"
      - "scripts/smoke_svg_export.py"
      - "samples/dxf_demo/stock_rect_1000x2000.dxf"
      - "samples/dxf_demo/part_arc_spline_chaining_ok.dxf"
      - "codex/reports/nesting_engine/lv8_density_t01_phase0_fixture_inventory.md"
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"
      - "tmp/lv8_density_phase0_shadow_runs/fixture_profile_inventory.json"

  - name: "Shadow run matrix script létrehozása"
    description: >
      Hozd létre a scripts/experiments/lv8_phase0_shadow_run_matrix.py scriptet.
      A script legyen vékony orchestrator: használja a T02 shadow profile-párokat,
      engine fixture-öknél subprocessként hívja a scripts/experiments/lv8_2sheet_claude_search.py
      harnesst, aggregálja a summary.json outputokat, és contract-freeze esetén
      futtassa a python3 scripts/smoke_svg_export.py smoke-ot. A script írjon
      phase0_shadow_matrix.json, phase0_shadow_matrix.md, runs.jsonl és
      hard_cut_decision.json artefaktokat. Ne módosíts Rust fájlt és ne módosítsd
      a T05 polygon validátort.
    inputs:
      - "scripts/experiments/lv8_2sheet_claude_search.py"
      - "scripts/experiments/lv8_polygon_validator.py"
      - "vrs_nesting/config/nesting_quality_profiles.py"
      - "scripts/smoke_svg_export.py"
    outputs:
      - "scripts/experiments/lv8_phase0_shadow_run_matrix.py"
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"

  - name: "Shadow matrix unit tesztek hozzáadása"
    description: >
      Adj hozzá célzott pytesteket a shadow matrix script döntési logikájára.
      Fedj legalább: profile-pár mapping import, missing fixture -> fixture_missing
      row + DEFER_HARD_CUT, no-SA jobb/equal -> pair_pass true, polygon gate false
      -> pair_pass false vagy invalid row, contract-freeze not_applicable row nem
      gyárt hamis util/placed összehasonlítást. A tesztek ne indítsanak hosszú
      LV8 engine benchmarkot és ne igényeljenek release binaryt.
    outputs:
      - "tests/test_lv8_phase0_shadow_run_matrix.py"
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"

  - name: "Célzott ellenőrzések futtatása"
    description: >
      Futtasd a gyors célzott ellenőrzéseket: python3 -m py_compile
      scripts/experiments/lv8_phase0_shadow_run_matrix.py, python3 -m pytest
      tests/test_lv8_phase0_shadow_run_matrix.py -q, python3 -m py_compile
      scripts/experiments/lv8_2sheet_claude_search.py, python3 -m py_compile
      scripts/experiments/lv8_polygon_validator.py. Az eredményeket írd a T06
      reportba. Ha a script nevét vagy teszt nevét indokoltan eltéríted, azt
      dokumentáld.
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"

  - name: "Phase 0 shadow matrix futtatása"
    description: >
      Futtasd a shadow matrixot. Ha a release binary hiányzik, építheted:
      cargo build --release -p nesting_engine. Engine fixture-öknél futtasd a
      legacy és no-SA profile-párokat a T02 mapping szerint. Contract-freeze
      esetén futtasd a python3 scripts/smoke_svg_export.py smoke-ot, vagy írd
      BLOCKED-ként, ha nem futtatható. A teljes futás outputja a tmp/lv8_density_phase0_shadow_runs/
      alá kerüljön. Ha hosszú LV8 futás időkeret miatt nem futtatható, akkor
      ne hamisíts PASS-t: jelöld DEFER_HARD_CUT vagy BLOCKED státusszal.
    outputs:
      - "tmp/lv8_density_phase0_shadow_runs/runs.jsonl"
      - "tmp/lv8_density_phase0_shadow_runs/phase0_shadow_matrix.json"
      - "tmp/lv8_density_phase0_shadow_runs/phase0_shadow_matrix.md"
      - "tmp/lv8_density_phase0_shadow_runs/hard_cut_decision.json"
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"

  - name: "Aggregált baseline és checkpoint report elkészítése"
    description: >
      Hozd létre a T06 task reportot és a checkpoint alias reportot. A task report
      Report Standard v2 szerint készüljön, DoD -> Evidence Matrix-szal. A
      codex/reports/nesting_engine/lv8_density_phase0_shadow_baseline.md checkpoint
      report foglalja össze röviden a matrixot, a polygon gate státuszt, a hard-cut
      decisiont és a T07 indulási feltételt. A report elején legyen PASS,
      PASS_WITH_NOTES, FAIL vagy BLOCKED. PASS csak teljes evidence mellett adható.
    outputs:
      - "codex/codex_checklist/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"
      - "codex/reports/nesting_engine/lv8_density_phase0_shadow_baseline.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd a standard repo gate-et wrapperrel: ./scripts/verify.sh --report
      codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md .
      A verify log kerüljön a report mellé. Ha a gate bukik, a report státusza
      FAIL legyen, és a DoD matrixban jelöld pontosan, mi bukott. Siker esetén
      PASS vagy PASS_WITH_NOTES státusz szerepeljen, de a hard-cut decision ettől
      függetlenül lehet DEFER_HARD_CUT.
    outputs:
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.md"
      - "codex/reports/nesting_engine/lv8_density_t06_phase0_shadow_run_baseline_report.verify.log"
