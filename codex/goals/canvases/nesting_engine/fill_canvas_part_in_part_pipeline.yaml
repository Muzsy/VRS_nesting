steps:
  - name: "Felderítés és canvas véglegesítése az aktuális repóállapotra"
    description: >
      Olvasd el:
      - AGENTS.md
      - canvases/nesting_engine/nesting_engine_backlog.md (F3-2)
      - docs/nesting_engine/f2_3_nfp_placer_spec.md
      - docs/nesting_engine/tolerance_policy.md
      - rust/nesting_engine/src/main.rs
      - rust/nesting_engine/src/multi_bin/greedy.rs
      - rust/nesting_engine/src/placement/blf.rs
      - scripts/check.sh

      A canvasban rögzítsd a jelenlegi repó-helyzetet:
      - holes vagy hole_collapsed esetén az NFP út továbbra is BLF fallback,
      - ezért F3-2 scope-ja most BLF cavity-aware candidate generation,
      - a feature legyen opt-in (`--part-in-part off|auto`, default off).
    outputs:
      - "canvases/nesting_engine/part_in_part_pipeline.md"

  - name: "CLI + vezetékezés: PartInPartMode bevezetése"
    description: >
      Vezess be egy PartInPartMode enumot (Off, Auto), és vezesd át:

      - rust/nesting_engine/src/main.rs
        - új `nest` flag: `--part-in-part off|auto`
        - default: `off`
        - a meglévő default viselkedés maradjon változatlan, ha a flag nincs megadva

      - rust/nesting_engine/src/multi_bin/greedy.rs
        - greedy_multi_sheet kapjon új paramétert: `part_in_part_mode`
        - ezt add tovább a BLF placernek
        - a meglévő NFP fallback policy-t ne bontsd meg

      - rust/nesting_engine/src/placement/blf.rs
        - blf_place kapjon új paramétert: `part_in_part_mode`

      Követelmény:
      - IO contract ne változzon
      - `--part-in-part off` mellett bitre ugyanaz a baseline út maradjon
    outputs:
      - "rust/nesting_engine/src/main.rs"
      - "rust/nesting_engine/src/multi_bin/greedy.rs"
      - "rust/nesting_engine/src/placement/blf.rs"

  - name: "BLF cavity-aware candidate generation implementálása"
    description: >
      A rust/nesting_engine/src/placement/blf.rs fájlban implementáld az `Auto` módot.

      Követelmények:
      - A cavity-jelöltek forrása kizárólag a már elhelyezett partok `inflated_polygon.holes` listája legyen.
      - Ha egy placed part outer-only (`holes=[]`), abból ne képződjön cavity-jelölt.
      - A hole-ok sorrendje legyen determinisztikus (bbox min_x, min_y, bbox area, hole index).
      - A candidate anchorok a hole geometriából származzanak (bbox/vertex-alapú, kis determinisztikus nudge listával),
        hogy off-grid, nem egész mm-es cavity pozíciókat is el lehessen érni.
      - Minden candidate ugyanazzal a meglévő `can_place()` narrow-phase-szal validálódjon.
      - Ha cavity candidate nem sikeres, a jelenlegi globális BLF grid-scan fusson le változatlanul.

      Adj hozzá új unit teszteket ugyanebbe a fájlba `blf_part_in_part_` prefixszel:
      - `blf_part_in_part_off_mode_preserves_baseline`
      - `blf_part_in_part_offgrid_hole_improves_sheet_count`
      - `blf_part_in_part_hole_collapsed_like_outer_only_source_is_ignored`
    outputs:
      - "rust/nesting_engine/src/placement/blf.rs"

  - name: "Új F3-2 fixture létrehozása"
    description: >
      Hozd létre: `poc/nesting_engine/f3_2_part_in_part_offgrid_fixture_v2.json`

      Követelmények:
      - `nesting_engine_v2` input schema
      - kisméretű, gyors fixture
      - legyen benne legalább:
        - 1 frame-szerű part (outer + 1 nagy hole)
        - 1 kisebb part, ami a hole-ba befér
      - a hole geometriája legyen tudatosan off-grid jellegű (nem egész mm anchorokkal),
        hogy `--part-in-part off` baseline alatt ne legyen könnyen megtalálható a cavity pozíció,
        míg az `auto` mód a hole-anchor candidate-ekkel megtalálja
      - a cél bizonyított különbség:
        - `--part-in-part off` -> `sheets_used == 2`
        - `--part-in-part auto` -> `sheets_used == 1`
    outputs:
      - "poc/nesting_engine/f3_2_part_in_part_offgrid_fixture_v2.json"

  - name: "CLI smoke + gate integráció"
    description: >
      Hozd létre az új smoke scriptet és kösd be a gate-be.

      Új script:
      - `scripts/smoke_part_in_part_pipeline.py`

      A script futtassa ugyanarra a fixture-re:
      - baseline: `nest --placer blf --part-in-part off`
      - cavity mód: `nest --placer blf --part-in-part auto`

      Assertok:
      - baseline sheets_used == 2
      - auto sheets_used == 1
      - mindkettőben van `meta.determinism_hash`
      - ugyanazzal a seed-del az auto mód ismételt futása hash-stabil

      A `scripts/check.sh` fájlba kösd be:
      - `cargo test --manifest-path rust/nesting_engine/Cargo.toml blf_part_in_part_`
      - `python3 scripts/smoke_part_in_part_pipeline.py --bin ... --input ...`
    outputs:
      - "scripts/smoke_part_in_part_pipeline.py"
      - "scripts/check.sh"

  - name: "Doksi szinkron: architecture + tolerance policy"
    description: >
      Frissítsd a következő fájlokat:
      - docs/nesting_engine/architecture.md
      - docs/nesting_engine/tolerance_policy.md

      Követelmények:
      - rögzítsd, hogy F3-2 ebben a körben BLF cavity-aware pipeline (nem teljes hole-aware NFP/CFR)
      - dokumentáld a `--part-in-part off|auto` jelentését
      - legyen explicit: `hole_collapsed` / outer-only part nem cavity-forrás
      - a validálás továbbra is a meglévő `can_place()` narrow-phase
    outputs:
      - "docs/nesting_engine/architecture.md"
      - "docs/nesting_engine/tolerance_policy.md"

  - name: "Checklist + report (Report Standard v2)"
    description: >
      Készítsd el:
      - codex/codex_checklist/nesting_engine/part_in_part_pipeline.md
      - codex/reports/nesting_engine/part_in_part_pipeline.md

      Követelmények:
      - DoD → Evidence Matrix a canvas DoD pontjai alapján
      - a reportban külön rögzítsd a fixture baseline vs auto eredményét (`sheets_used`)
      - AUTO_VERIFY blokk legyen jelen, de kézzel ne töltsd ki
    outputs:
      - "codex/codex_checklist/nesting_engine/part_in_part_pipeline.md"
      - "codex/reports/nesting_engine/part_in_part_pipeline.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd:
      ./scripts/verify.sh --report codex/reports/nesting_engine/part_in_part_pipeline.md

      Az AUTO_VERIFY blokkot tilos kézzel szerkeszteni.
    outputs:
      - "codex/reports/nesting_engine/part_in_part_pipeline.md"
      - "codex/reports/nesting_engine/part_in_part_pipeline.verify.log"
