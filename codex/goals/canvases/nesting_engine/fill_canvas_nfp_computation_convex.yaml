steps:
  - name: "Szabályok és előzmények betöltése"
    description: >
      Olvasd el az AGENTS.md-t és rögzítsd a kötelező outputs szabályt.
      Nyisd meg a következő fájlokat (kontextus és invariánsok):
        - docs/nesting_engine/tolerance_policy.md (SCALE, TOUCH_TOL)
        - rust/nesting_engine/src/geometry/types.rs (Point64, Polygon64 típusok)
        - rust/nesting_engine/src/geometry/pipeline.rs (inflated pipeline output)
        - rust/nesting_engine/src/lib.rs vagy main.rs (modul regisztrációs pont)
        - poc/nesting_engine/baseline_benchmark.md (F1 baseline — a javulás mérési alap)
        - canvases/nesting_engine/nfp_computation_convex.md (task specifikáció)
      Ha bármelyik fájl nem létezik: állj meg és jelezd, pontosan mit kerestél és hol.
    outputs:
      - "canvases/nesting_engine/nfp_computation_convex.md"

  - name: "i128 cross product helper + CCW/konvexitás ellenőrzők"
    description: >
      Bővítsd a rust/nesting_engine/src/geometry/types.rs (vagy egy új
      rust/nesting_engine/src/geometry/predicates.rs) fájlt a következőkkel:

        1) cross_product_i128(dx1: i64, dy1: i64, dx2: i64, dy2: i64) -> i128
           - minden szorzás i128-on történik (overflow védelem)
           - ez a KÖTELEZŐ helper, amit minden irányítottság-ellenőrzés hív

        2) is_ccw(poly: &Polygon64) -> bool
           - a poligon területének előjele alapján (shoelace formula, i128)
           - CCW = pozitív terület

        3) is_convex(poly: &Polygon64) -> bool
           - minden egymást követő él cross product előjele azonos
           - uses cross_product_i128

      Unit tesztek (minimum):
        - rect 4 csúcs: is_ccw=true, is_convex=true
        - CW rect: is_ccw=false
        - L-alak: is_convex=false

      Ha a helperek már léteznek: ellenőrizd, hogy i128-at használnak-e,
      és javítsd, ha szükséges.
    outputs:
      - "rust/nesting_engine/src/geometry/types.rs"

  - name: "NFP modul scaffold + NfpError"
    description: >
      Hozd létre vagy frissítsd a rust/nesting_engine/src/nfp/mod.rs fájlt:
        - pub mod convex;
        - pub mod cache;
        - NfpError enum: NotConvex, EmptyPolygon
          (InvalidInput variant nem szükséges — a NotConvex + EmptyPolygon lefedi az összes esetet)
        - A modul doccomment röviden leírja: ez az NFP réteg, F2-1 = konvex,
          F2-2 = konkáv (külön task), a cache API mindkettőt kiszolgálja

      Regisztráld a nfp modult a lib.rs-ben vagy main.rs-ben:
        pub mod nfp;

      Ellenőrizd, hogy `cargo build` PASS (üres modulokkal is).

      Megjegyzés: ha a fájl már létezik, csak a szükséges módosításokat végezd el.
    outputs:
      - "rust/nesting_engine/src/nfp/mod.rs"
      - "rust/nesting_engine/src/lib.rs"

  - name: "NFP cache implementáció (F2-2 kompatibilis API)"
    description: >
      Hozd létre a rust/nesting_engine/src/nfp/cache.rs fájlt:

        NfpCacheKey:
          shape_id_a: u64
          shape_id_b: u64
          rotation_steps_b: i16   ← NEM f64, NEM f32
          (derive: Debug, Clone, PartialEq, Eq, Hash)

        CacheStats:
          hits: u64
          misses: u64
          entries: usize

        NfpCache:
          store: HashMap<NfpCacheKey, Polygon64>
          hits: u64
          misses: u64
          fn get(&mut self, key: &NfpCacheKey) -> Option<&Polygon64>
          fn insert(&mut self, key: NfpCacheKey, nfp: Polygon64)
          fn stats(&self) -> CacheStats

      Fontos megszorítások:
        - A kulcstípusban TILOS f64/f32 mező (clip: float_arithmetic)
        - A modul doccomment magyarázza a rotation_steps_b értelmezését:
          "0..=(360/rotation_step_deg − 1), az f64 fokszám kerülendő"
        - Az F2-2 (konkáv NFP) ugyanezt a cache-t fogja használni —
          az API nem változhat F2-2 implementálása során

      Unit tesztek (minimum):
        - insert + get: hit visszaad azonos polygont
        - miss: None-t ad vissza
        - stats: hits/misses helyes számlálás
    outputs:
      - "rust/nesting_engine/src/nfp/cache.rs"

  - name: "Konvex NFP implementáció (pairwise vertex sums + Andrew monotone chain hull)"
    description: >
      Hozd létre vagy frissítsd a rust/nesting_engine/src/nfp/convex.rs fájlt.

      A TÉNYLEGES algoritmus — NEM edge-merge, HANEM pairwise sums + hull:

        pub fn compute_convex_nfp(a: &Polygon64, b: &Polygon64) -> Result<Polygon64, NfpError>

        Lépések sorrendben:
          1) normalize_ring(): duplikált szomszédos csúcsok és záró ismétlés eltávolítása
          2) len() < 3 → Err(NfpError::EmptyPolygon)
          3) debug_assert!(is_ccw(a)), debug_assert!(is_ccw(b))
          4) is_convex check — ha megbukik: Err(NfpError::NotConvex)
          5) Release CCW javítás: if !is_ccw { outer.reverse() }
             Ez robusztusabb mint assert-only, de a pipeline invariáns (inflate=CCW) ettől marad.
          6) B tükrözése: neg_b[i] = Point64 { x: -b[i].x, y: -b[i].y }
          7) Pairwise sums — O(n×m) pont:
               for pa in a_outer:
                 for pb in neg_b:
                   pairwise_sums.push(pa + pb)
          8) convex_hull(pairwise_sums) — Andrew monotone chain:
               sort_by (x, y) lex
               dedup()
               lower hull + upper hull, pop ha turn(a,b,c) <= 0
               (turn <= 0 kollineáris pontokat is kiszűri → minimális csúcsszám)
               turn() KIZÁRÓLAG cross_product_i128()-et hív
          9) hull.len() < 3 → Err(NfpError::NotConvex)
         10) Ok(Polygon64 { outer: hull, holes: vec![] })

      Komplexitás: O(n×m × log(n×m))
        - Kis n,m esetén elhanyagolható
        - Inflate utáni 400 csúcsos poligonoknál n×m = 160k — a cache eliminálni fogja
          (F2-3 cache miss counter mérése kötelező)

      Kollinearitás kezelése: turn<=0 implicit kiszűri → NFP minimális csúcsszámú.
      Ez F2-3-ban kedvező (boolean műveletek kevesebb ponttal gyorsabbak).

      Kezdőpont: lex. min (x,y) — a monotone chain sort stabilitásából adódóan.

      Unit tesztek (minimum, kézzel számolt referencia értékekkel):
        1) rect_100x50 × rect_60x30 → ismert NFP téglalap
        2) square_50 × square_50 → ismert square_100
        3) rect × rect különböző méretarányban
        4) nem-konvex L-alak bemenet → Err(NfpError::NotConvex)
        5) üres polygon (<3 csúcs) → Err(NfpError::EmptyPolygon)
    outputs:
      - "rust/nesting_engine/src/nfp/convex.rs"

  - name: "Regressziós fixture könyvtár alapítása"
    description: >
      Hozd létre vagy frissítsd:

        poc/nfp_regression/README.md
          - A könyvtár célja: reprodukálható, kézzel ellenőrzött NFP referencia tesztek
          - Fixture JSON formátum leírása:
            {
              "description": "...",
              "polygon_a": [[x,y], ...],   ← integer egységben (nem mm, nem SCALE-lel szorozva)
              "polygon_b": [[x,y], ...],   ← integer egységben
              "rotation_deg_b": 0,
              "expected_nfp": [[x,y], ...],
              "expected_vertex_count": N
            }
          - Koordináták integer rácson; a Rust teszt közvetlenül i64-ként olvassa be
          - Hogyan futtathatók: cargo test --test nfp_regression

        poc/nfp_regression/convex_rect_rect.json
          - A: 100×50 téglalap (CCW), B: 60×30 téglalap (CCW), rotation=0°
          - expected_nfp: kézzel kiszámolt értékek integer egységben

        poc/nfp_regression/convex_rect_square.json
          - A: 100×50 téglalap, B: 40×40 négyzet, rotation=0°
          - expected_nfp: kézzel kiszámolt értékek integer egységben
    outputs:
      - "poc/nfp_regression/README.md"
      - "poc/nfp_regression/convex_rect_rect.json"
      - "poc/nfp_regression/convex_rect_square.json"

  - name: "Integrációs teszt: fixture-alapú NFP regresszió"
    description: >
      Hozd létre vagy frissítsd a rust/nesting_engine/tests/nfp_regression.rs integrációs tesztet:

        - Betölti a poc/nfp_regression/*.json fixture-öket
        - Minden fixture-re:
            1) polygon_a és polygon_b konvertálása Polygon64-re (koordinátákat közvetlenül
               i64-ként olvassa be — nincs SCALE konverzió a fixture-szinten)
            2) compute_convex_nfp() futtatása
            3) Eredmény csúcsainak összehasonlítása expected_nfp-vel
               canonicalize_ring alapú EGZAKT egyezéssel (nincs tolerancia —
               integer aritmetika determinisztikus)
            4) expected_vertex_count egyezés ellenőrzése
            5) Determinizmus: azonos fixture kétszeri futtatása azonos eredményt ad
        - cargo test --test nfp_regression → PASS
    outputs:
      - "rust/nesting_engine/tests/nfp_regression.rs"

  - name: "Checklist és report vázlat létrehozása"
    description: >
      Hozd létre:

        codex/codex_checklist/nesting_engine/nfp_computation_convex.md
          - Canvas DoD pontjainak pipálható listája
          - Feladat-specifikus ellenőrzési pontok (i128 helper, cache kulcstípus,
            regressziós fixture-ök, determinizmus)

        codex/reports/nesting_engine/nfp_computation_convex.md
          - docs/codex/report_standard.md (Report Standard v2) szerint
          - Meta szekció kitöltve
          - Scope: cél és nem-cél
          - Változások összefoglalója: érintett fájlok
          - DoD → Evidence Matrix váz (evidence a gate után töltendő ki)
          - AUTO_VERIFY blokk placeholder
    outputs:
      - "codex/codex_checklist/nesting_engine/nfp_computation_convex.md"
      - "codex/reports/nesting_engine/nfp_computation_convex.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd:
        ./scripts/verify.sh --report codex/reports/nesting_engine/nfp_computation_convex.md

      A wrapper futtatja a teljes check.sh-t (beleértve a meglévő F1 smoke-ot,
      cargo test, vrs_solver regresszió), logot ment és frissíti a report
      AUTO_VERIFY blokkját.

      Ellenőrizd a gate kimenetében:
        - cargo test nesting_engine PASS (unit tesztek + integrációs nfp_regression)
        - cargo build vrs_solver PASS (regresszió nem sérül)
        - cargo build nesting_engine PASS
        - 0 overlap / 0 out-of-bounds a baseline fixture-ön (F1 regresszió)

      Ha FAIL: ne zárj le semmit, javítsd a hibát és futtasd újra.
    outputs:
      - "codex/reports/nesting_engine/nfp_computation_convex.md"
      - "codex/reports/nesting_engine/nfp_computation_convex.verify.log"
