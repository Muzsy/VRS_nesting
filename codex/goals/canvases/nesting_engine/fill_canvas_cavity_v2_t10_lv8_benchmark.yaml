steps:
  - name: "Task artefaktok és kontextus olvasása"
    description: >
      Keresd meg a repo-ban a LV8 fixture-öket:
        find . -name "*lv8*" -o -name "*LV8*" | grep -v __pycache__
        find tests/ -name "*.json" | head -20
        find poc/ -name "*.json" | head -20
      Ha LV8 specifikus fixture nem létezik, azonosítsd a legjobb meglévő
      benchmark fixture-t (pl. poc/sparrow_io/ vagy tests/fixtures/).
      Ellenőrizd, hogy T06 (build_cavity_prepacked_engine_input_v2),
      T07 (normalizer v2 flatten), T08 (cavity_validation) mind implementálva.
    outputs:
      - "canvases/nesting_engine/cavity_v2_t10_lv8_benchmark.md"
      - "codex/goals/canvases/nesting_engine/fill_canvas_cavity_v2_t10_lv8_benchmark.yaml"
      - "codex/prompts/nesting_engine/cavity_v2_t10_lv8_benchmark/run.md"

  - name: "scripts/benchmark_cavity_v2_lv8.py elkészítése"
    description: >
      Hozd létre a scripts/benchmark_cavity_v2_lv8.py futtatható szkriptet
      a canvas spec alapján. A szkript:
      (1) Argparse-szal fogad --fixture PATH és --output-dir opciókat,
      (2) Ha nincs fixture, poc/ és tests/fixtures/ alatt keres automatikusan,
      (3) Meghívja build_cavity_prepacked_engine_input_v2()-t,
      (4) Futtatja validate_prepack_solver_input_hole_free()-t,
      (5) Méri az összes canvas-ban felsorolt metrikát,
      (6) Futtatja validate_cavity_plan_v2()-t (T08),
      (7) A minimum feltételeket assertálja (holes=0, qty_mismatch=0, guard_passed),
      (8) JSON artefaktumot ment tmp/benchmark_results/ mappába,
      (9) Exit code 0 siker, 1 minimum criteria failure esetén.
    outputs:
      - "scripts/benchmark_cavity_v2_lv8.py"

  - name: "Benchmark futtatása (ha fixture elérhető)"
    description: >
      Futtasd: python3 scripts/benchmark_cavity_v2_lv8.py
      Ha fixture nem érhető el automatikusan, futtasd kézzel az elérhető
      legjobb fixture-rel:
        python3 scripts/benchmark_cavity_v2_lv8.py --fixture <path>
      Ha egyetlen fixture sem elérhető, rögzítsd ezt a reportban és ugorj a
      minimum feltételek szintaktikai ellenőrzésére (python3 -c "import scripts.benchmark_cavity_v2_lv8").
    outputs:
      - "tmp/benchmark_results/"

  - name: "Szintaktikai ellenőrzés"
    description: >
      Futtasd: python3 -c "import sys; sys.path.insert(0,'.')"
               python3 scripts/benchmark_cavity_v2_lv8.py --help
      A szkript legyen importálható Python szintaxishibák nélkül.
    outputs: []

  - name: "Checklist és report elkészítése"
    description: >
      Töltsd ki a checklistet és a reportot. Bizonyítsd: szkript létezik,
      importálható, --help fut, ha volt benchmark futtatás: artefaktum megvan
      és a minimum feltételek teljesültek (top_level_holes=0, qty_mismatch=0,
      guard_passed). Ha nem volt fixture: rögzítsd a hiányt és a javasolt
      fixture forrást.
    outputs:
      - "codex/codex_checklist/nesting_engine/cavity_v2_t10_lv8_benchmark.md"
      - "codex/reports/nesting_engine/cavity_v2_t10_lv8_benchmark.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd: ./scripts/verify.sh --report codex/reports/nesting_engine/cavity_v2_t10_lv8_benchmark.md
    outputs:
      - "codex/reports/nesting_engine/cavity_v2_t10_lv8_benchmark.md"
      - "codex/reports/nesting_engine/cavity_v2_t10_lv8_benchmark.verify.log"
