# codex/goals/canvases/nesting_engine/fill_canvas_nesting_engine_f2_3_large_fixture_benchmark.yaml

steps:
  - name: "Felderítés: input/output mezők és futtatási parancs pontosítása"
    description: >
      Olvasd el:
      - AGENTS.md
      - poc/nesting_engine/f2_3_f4_cfr_order_hardening_noholes_v2.json (input schema)
      - scripts/check.sh (nesting_engine futtatás: stdin, 'nest', '--placer nfp')
      - scripts/smoke_nfp_placer_stats_and_perf_gate.py (NEST_NFP_STATS_V1 parsing logika mintának)
      - docs/nesting_engine/io_contract_v2.md (output v2 mezők: hol van determinism_hash, sheets/placements mezők)

      A canvasban rögzítsd:
      - pontos CLI-t (stdin, stdout JSON),
      - mely output mezőkből számolható biztosan: sheets_used, placed_count, determinism_hash.
    outputs:
      - "canvases/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.md"

  - name: "Large fixture generátor + generált JSON-ok létrehozása"
    description: >
      Hozd létre a generátor scriptet és a generált fixture-eket.

      1) Script:
         - scripts/gen_nesting_engine_large_fixture.py
         - base input: poc/nesting_engine/f2_3_f4_cfr_order_hardening_noholes_v2.json
         - generálás szabályai a canvas szerint (explicit 1-es quantity, egyedi id-k)

      2) Generált fájlok:
         - poc/nesting_engine/f2_3_large_500_noholes_v2.json
         - poc/nesting_engine/f2_3_large_1000_noholes_v2.json

      Kötelező:
      - a generált JSON legyen stabil (azonos output ugyanarra a base inputra).
      - python3 -m json.tool mindkettőre PASS.
    outputs:
      - "scripts/gen_nesting_engine_large_fixture.py"
      - "poc/nesting_engine/f2_3_large_500_noholes_v2.json"
      - "poc/nesting_engine/f2_3_large_1000_noholes_v2.json"

  - name: "Benchmark script: BLF vs NFP futtatás + stats + determinism ellenőrzés"
    description: >
      Hozd létre:
      - scripts/bench_nesting_engine_f2_3_large_fixture.py

      Követelmények:
      - futtatja a binárist subprocess-szel, stdin-ből adja az input json-t
      - méri runtime-ot (time.perf_counter)
      - NFP esetén env: NESTING_ENGINE_EMIT_NFP_STATS=1
      - stderr-ből kiolvassa az egyetlen NEST_NFP_STATS_V1 sort
      - stdout-ból json parse, determinism_hash kiolvasása
      - N darab futás után ellenőrzi, hogy azonos placer+input mellett a hash stabil
      - kimenti az összefoglalót JSON-ba (runs/benchmarks/...)
    outputs:
      - "scripts/bench_nesting_engine_f2_3_large_fixture.py"

  - name: "Checklist + report (Report Standard v2) + mérés lefuttatása"
    description: >
      Hozd létre:
      - codex/codex_checklist/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.md
      - codex/reports/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.md

      Majd futtasd a benchmarkot (release bin):
      - cargo build --release --manifest-path rust/nesting_engine/Cargo.toml
      - python3 scripts/bench_nesting_engine_f2_3_large_fixture.py --placer both --runs 5 --input poc/nesting_engine/f2_3_large_500_noholes_v2.json
      - python3 scripts/bench_nesting_engine_f2_3_large_fixture.py --placer both --runs 5 --input poc/nesting_engine/f2_3_large_1000_noholes_v2.json

      A reportba írd be a mérési összefoglalót (medianok + hash stabilitás).
      Az AUTO_VERIFY blokkot üresen hagyd.
    outputs:
      - "codex/codex_checklist/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.md"
      - "codex/reports/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.md"

  - name: "Repo gate (verify wrapper)"
    description: >
      Futtasd:
      ./scripts/verify.sh --report codex/reports/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.md
    outputs:
      - "codex/reports/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.md"
      - "codex/reports/nesting_engine/nesting_engine_f2_3_large_fixture_benchmark.verify.log"