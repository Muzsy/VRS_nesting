# codex/goals/canvases/nesting_engine/fill_canvas_nesting_engine_f2_3_real_dxf_quality_benchmark.yaml

steps:
  - name: "Felderítés: DXF->solver_input pontok és nesting_engine_v2 input mezők"
    description: >
      Olvasd el:
      - AGENTS.md
      - scripts/export_real_dxf_nfp_pairs.py (DXF->solver_input.stocks/parts outer_points)
      - docs/nesting_engine/io_contract_v2.md (nesting_engine_v2 input mezők)
      - scripts/bench_nesting_engine_f2_3_large_fixture.py (milyen output mezőket olvas)

      A canvasban rögzítsd:
      - mely mezőkből vesszük a stock/part outer pontokat,
      - hogyan számoljuk a sheet width/height-et (AABB),
      - miért outer-only/holes=[] a benchmarknál (NFP gating miatt).
    outputs:
      - "canvases/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.md"

  - name: "DXF-alapú nesting_engine fixture generátor + 200/500 fixture-ek"
    description: >
      Hozd létre:
      - scripts/gen_nesting_engine_real_dxf_quality_fixture.py

      Követelmények:
      - default input DXF-ek:
        - samples/dxf_demo/stock_rect_1000x2000.dxf
        - samples/dxf_demo/part_arc_spline_chaining_ok.dxf
      - vrs_nesting.project.model.DxfProjectModel + build_sparrow_inputs használata
      - canonicalize: dupe pop, close pop, lex-min rotate, CCW, min->0,0
      - output: nesting_engine_v2 JSON
      - generálja:
        - poc/nesting_engine/real_dxf_quality_200_outer_only_v2.json
        - poc/nesting_engine/real_dxf_quality_500_outer_only_v2.json
      - mindkettőben: time_limit_sec default 300 (flaggel felülírható)
      - parts explicit példányok: quantity=1, egyedi id

      Futtass gyors JSON-validálást:
      - python3 -m json.tool a két generált fájlra.
    outputs:
      - "scripts/gen_nesting_engine_real_dxf_quality_fixture.py"
      - "poc/nesting_engine/real_dxf_quality_200_outer_only_v2.json"
      - "poc/nesting_engine/real_dxf_quality_500_outer_only_v2.json"

  - name: "Mérés lefuttatása (BLF vs NFP) + report"
    description: >
      Build:
      - cargo build --release --manifest-path rust/nesting_engine/Cargo.toml

      Benchmark (re-use):
      - python3 scripts/bench_nesting_engine_f2_3_large_fixture.py --placer both --runs 5 --input poc/nesting_engine/real_dxf_quality_200_outer_only_v2.json
      - python3 scripts/bench_nesting_engine_f2_3_large_fixture.py --placer both --runs 5 --input poc/nesting_engine/real_dxf_quality_500_outer_only_v2.json

      Hozd létre:
      - codex/codex_checklist/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.md
      - codex/reports/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.md
      a Report Standard v2 szerint, és írd bele a median összefoglalót.
      AUTO_VERIFY blokkot hagyd üresen.
    outputs:
      - "codex/codex_checklist/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.md"
      - "codex/reports/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.md"

  - name: "Repo gate (verify wrapper)"
    description: >
      Futtasd:
      ./scripts/verify.sh --report codex/reports/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.md
    outputs:
      - "codex/reports/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.md"
      - "codex/reports/nesting_engine/nesting_engine_f2_3_real_dxf_quality_benchmark.verify.log"