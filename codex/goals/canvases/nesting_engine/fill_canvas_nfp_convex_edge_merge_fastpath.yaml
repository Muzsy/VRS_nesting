steps:
  - name: "Szabályok és előzmények betöltése"
    description: >
      Olvasd el az AGENTS.md-t és rögzítsd a kötelező outputs szabályt.
      Nyisd meg a következő fájlokat:
        - docs/nesting_engine/tolerance_policy.md (SCALE, TOUCH_TOL)
        - rust/nesting_engine/src/geometry/types.rs (cross_product_i128, is_ccw, is_convex)
        - rust/nesting_engine/src/nfp/convex.rs (jelenlegi hull implementáció — ezt módosítjuk)
        - rust/nesting_engine/src/nfp/mod.rs (NfpError — nem változik)
        - rust/nesting_engine/tests/nfp_regression.rs (bővítendő cross-check teszttel)
        - poc/nfp_regression/*.json (fixture-ök — nem változnak)
        - canvases/nesting_engine/nfp_convex_edge_merge_fastpath.md (task specifikáció)
      Ha bármelyik fájl nem létezik: állj meg és jelezd pontosan.
    outputs:
      - "canvases/nesting_engine/nfp_convex_edge_merge_fastpath.md"

  - name: "Hull implementáció átnevezése referencia/fallback-ké"
    description: >
      A rust/nesting_engine/src/nfp/convex.rs-ben:

      1) A jelenlegi `compute_convex_nfp()` függvényt nevezd át:
           → `compute_convex_nfp_reference()`
         Doccomment frissítve:
           "Referencia / fallback: pairwise vertex sums + Andrew monotone chain hull.
            O(n×m×log(n×m)). Használat: keresztellenőrzés, degenerált bemenetek, tesztelés."

      2) Minden belső segédfüggvény (normalize_ring, turn, convex_hull) marad változatlan.

      3) cargo build PASS ellenőrzés (a régi `compute_convex_nfp` hívók még nem léteznek
         ebben a lépésben — a következő step vezeti be az új publikus API-t).

      Figyelem: ebben a lépésben CSAK az átnevezés történik, semmi más.
    outputs:
      - "rust/nesting_engine/src/nfp/convex.rs"

  - name: "Edge-merge fastpath implementáció"
    description: >
      A rust/nesting_engine/src/nfp/convex.rs-ben implementáld az új
      `compute_convex_nfp()` függvényt O(n+m) edge-merge algoritmussal:

        pub fn compute_convex_nfp(a: &Polygon64, b: &Polygon64) -> Result<Polygon64, NfpError>

      Kötelező lépések sorrendben:

        1) normalize_ring(a), normalize_ring(b) — duplikált és záró csúcsok eltávolítása
        2) len < 3 ellenőrzés → Err(NfpError::EmptyPolygon)
        3) debug_assert!(is_ccw), release-ben is reverse ha CW (mint a hull-ban)
        4) is_convex ellenőrzés → Err(NfpError::NotConvex)
        5) b_neg: minden b csúcs → (-x, -y)
        6) Lexikografikus kezdőpont MINDKÉT poligonon:
             start_a = argmin_lex(a_outer)   // legkisebb (x, y)
             start_b = argmin_lex(b_neg)
           Mindkét lista rotate_left(start_idx) (in-place)
        7) Él-vektorok:
             eA[i] = a[(i+1) % n] - a[i]
             eB[j] = b_neg[(j+1) % m] - b_neg[j]
        8) Szög-merge loop (i=0, j=0, amíg i<n || j<m):
             cross = cross_product_i128(eA[i].x, eA[i].y, eB[j].x, eB[j].y)
             cross > 0  → output_edges.push(eA[i]), i++
             cross < 0  → output_edges.push(eB[j]), j++
             cross == 0 → output_edges.push(eA[i] + eB[j]), i++, j++  // collinear merge
           Maradék élek (ha i<n vagy j<m): hozzáfűzés
        9) Prefix-sum kontúrépítés:
             p[0] = a_outer[0] + b_neg[0]   (start_a és start_b már rotate-olva)
             p[k+1] = p[k] + output_edges[k]
        10) normalize_ring(kontúr) → Err(NotConvex) ha len < 3
        11) Ok(Polygon64 { outer: kontúr, holes: vec![] })

      KÖTELEZŐ: a szög-merge komparátorban KIZÁRÓLAG cross_product_i128() hívható —
      közvetlen i64 szorzat TILOS.

      Unit tesztek (a convex.rs #[cfg(test)] blokkjában, minimum):
        1) rect_100x50 × rect_60x30 → ismert NFP (kézzel számolt)
        2) square_50 × square_50 → ismert square_100
        3) párhuzamos élek esete: két azonos méretű téglalap → collinear merge helyes
        4) nem-konvex L-alak → Err(NfpError::NotConvex)
        5) üres polygon → Err(NfpError::EmptyPolygon)
        6) determinizmus: azonos input kétszer → azonos csúcslista
    outputs:
      - "rust/nesting_engine/src/nfp/convex.rs"

  - name: "Cross-check teszt: edge-merge == hull minden fixture-re"
    description: >
      Bővítsd a rust/nesting_engine/tests/nfp_regression.rs fájlt egy új
      tesztfüggvénnyel:

        #[test]
        fn edge_merge_equals_hull_on_all_fixtures()

      Minden poc/nfp_regression/*.json fixture-re:
        1) Betölti polygon_a és polygon_b (i64, nincs skálázás)
        2) compute_convex_nfp(&a, &b) → edge_result
        3) compute_convex_nfp_reference(&a, &b) → hull_result
        4) assert_eq!(
             canonicalize_ring(&edge_result.outer),
             canonicalize_ring(&hull_result.outer),
             "edge-merge != hull on fixture ..."
           )

      A meglévő `fixture_library_passes` teszt változatlan marad és
      automatikusan az új `compute_convex_nfp()` (edge-merge) utat teszteli.

      Ellenőrizd: `cargo test --test nfp_regression` PASS mindkét tesztfüggvényre.
    outputs:
      - "rust/nesting_engine/tests/nfp_regression.rs"

  - name: "Checklist és report vázlat"
    description: >
      Hozd létre:

        codex/codex_checklist/nesting_engine/nfp_convex_edge_merge_fastpath.md
          - Canvas DoD pontjainak pipálható listája
          - Feladat-specifikus: edge-merge fastpath, cross-check teszt,
            collinear merge unit teszt, determinizmus

        codex/reports/nesting_engine/nfp_convex_edge_merge_fastpath.md
          - docs/codex/report_standard.md (Report Standard v2) szerint
          - Meta szekció kitöltve
          - Scope: cél (fastpath) és nem-cél (hull nem törlődik)
          - Változások összefoglalója: érintett fájlok
          - DoD → Evidence Matrix váz
          - AUTO_VERIFY blokk placeholder
    outputs:
      - "codex/codex_checklist/nesting_engine/nfp_convex_edge_merge_fastpath.md"
      - "codex/reports/nesting_engine/nfp_convex_edge_merge_fastpath.md"

  - name: "Repo gate (automatikus verify)"
    description: >
      Futtasd:
        ./scripts/verify.sh --report codex/reports/nesting_engine/nfp_convex_edge_merge_fastpath.md

      A wrapper futtatja a teljes check.sh-t, logot ment és frissíti a report
      AUTO_VERIFY blokkját.

      Ellenőrizd a gate kimenetében:
        - cargo test nesting_engine PASS (unit + fixture_library_passes + edge_merge_equals_hull)
        - cargo build vrs_solver PASS (F1 regresszió nem sérül)
        - cargo build nesting_engine PASS
        - 0 overlap / 0 out-of-bounds a baseline fixture-ön

      Ha FAIL: ne zárj le semmit, javítsd a hibát és futtasd újra.
    outputs:
      - "codex/reports/nesting_engine/nfp_convex_edge_merge_fastpath.md"
      - "codex/reports/nesting_engine/nfp_convex_edge_merge_fastpath.verify.log"
